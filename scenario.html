<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time of Empire — 文明史トレーラー</title>
<style>
  :root{
    --ink:#f4ead5;
    --dim:#b9a98a;
    --gold:#e0b54a;
    --tint:#1a1410;       /* 現在の時代の色（JSで切替） */
    --accent:#c97b3c;     /* 現在の時代のアクセント */
    --accent2:#e0b54a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    color:var(--ink); background:#0b0907; overflow-x:hidden;
    line-height:1.85; -webkit-font-smoothing:antialiased;
  }
  .mincho{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;}

  /* === 背景レイヤー：時代ごとに色がにじみ変わる === */
  #bgfx{position:fixed; inset:0; z-index:-2; transition:background 1.4s ease;
    background:
      radial-gradient(120% 80% at 50% -10%, color-mix(in srgb,var(--accent) 28%, transparent), transparent 60%),
      radial-gradient(90% 60% at 80% 110%, color-mix(in srgb,var(--tint) 80%, transparent), transparent 70%),
      linear-gradient(180deg, #0b0907, var(--tint));
  }
  #grain{position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  /* シネマ用レターボックス */
  .bar{position:fixed; left:0; right:0; height:34px; background:#000; z-index:60; pointer-events:none;}
  .bar.top{top:0; box-shadow:0 1px 0 rgba(224,181,74,.15);} .bar.bot{bottom:0; box-shadow:0 -1px 0 rgba(224,181,74,.15);}

  /* スクロール進捗バー */
  #prog{position:fixed; top:34px; left:0; height:3px; width:0; z-index:61;
    background:linear-gradient(90deg,var(--accent),var(--gold)); box-shadow:0 0 12px var(--gold); transition:width .1s linear;}

  /* タイムライン・ナビ（右） */
  #nav{position:fixed; right:14px; top:50%; transform:translateY(-50%); z-index:55; display:flex; flex-direction:column; gap:13px;}
  #nav a{width:11px; height:11px; border-radius:50%; border:1.5px solid var(--dim); opacity:.5; transition:.3s; position:relative;}
  #nav a.active{opacity:1; background:var(--gold); border-color:var(--gold); box-shadow:0 0 12px var(--gold); transform:scale(1.25);}
  #nav a span{position:absolute; right:20px; top:50%; transform:translateY(-50%); white-space:nowrap;
    font-size:11px; color:var(--dim); opacity:0; transition:.3s; pointer-events:none; letter-spacing:.08em;}
  #nav a:hover span{opacity:1;}
  @media(max-width:640px){ #nav{display:none;} }

  section{position:relative; padding:0 22px; max-width:760px; margin:0 auto;}
  .pad{min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding-top:60px; padding-bottom:60px;}

  /* === reveal === */
  .rv{opacity:0; transform:translateY(34px); transition:opacity 1s ease, transform 1s cubic-bezier(.2,.7,.2,1);}
  .rv.in{opacity:1; transform:none;}
  .rv.blur{filter:blur(8px);} .rv.blur.in{filter:blur(0);}

  /* === ヒーロー === */
  #hero{height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative;}
  .toptag{font-size:11px; letter-spacing:.55em; color:var(--gold); margin-bottom:26px; text-indent:.55em;}
  .hero-poem{font-size:clamp(15px,2.4vw,20px); color:var(--dim); margin-bottom:30px; letter-spacing:.06em;}
  .hero-poem b{color:var(--ink); font-weight:400;}
  #hero h1{font-size:clamp(44px,11vw,108px); letter-spacing:.04em; line-height:1;
    background:linear-gradient(180deg,#fff7e0,#e0b54a 60%,#b9852a); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 50px rgba(224,181,74,.25); margin:6px 0 4px;}
  .hero-sub{font-size:clamp(12px,2vw,15px); color:var(--dim); letter-spacing:.3em; margin-top:14px;}
  .scrollcue{position:absolute; bottom:46px; font-size:11px; color:var(--dim); letter-spacing:.25em; animation:bob 2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0); opacity:.5} 50%{transform:translateY(8px); opacity:1}}
  .embers{position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:-1;}
  .ember{position:absolute; bottom:-10px; width:4px; height:4px; border-radius:50%;
    background:radial-gradient(circle,#ffd27a,#c97b3c); box-shadow:0 0 8px #e0b54a; animation:fly linear infinite;}
  @keyframes fly{to{transform:translateY(-105vh) translateX(var(--dx)); opacity:0;}}

  /* === 時代タイトルカード === */
  .titlecard{height:92vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .titlecard .era-no{font-size:12px; letter-spacing:.5em; color:var(--accent2); margin-bottom:10px;}
  .titlecard .big-emoji{font-size:clamp(80px,18vw,150px); line-height:1; filter:drop-shadow(0 12px 40px rgba(0,0,0,.6)); animation:float 6s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .titlecard h2{font-size:clamp(40px,9vw,82px); letter-spacing:.12em; margin:14px 0 0; color:#fff; text-shadow:0 4px 30px rgba(0,0,0,.5);}
  .titlecard .era-en{font-size:12px; letter-spacing:.4em; color:var(--dim); margin-top:14px;}
  .titlecard .era-tag{margin-top:26px; font-size:clamp(15px,2.5vw,21px); color:var(--ink); max-width:540px; line-height:1.7;}
  .rule{width:60px; height:2px; margin:22px auto 0; background:linear-gradient(90deg,transparent,var(--accent2),transparent);}

  /* セクション見出し */
  .kicker{font-size:11px; letter-spacing:.4em; color:var(--accent2); margin-bottom:14px;}
  .air p{font-size:clamp(15px,2.2vw,18px); color:var(--ink); margin-bottom:18px;}
  .air .lead{font-size:clamp(19px,3vw,26px); color:#fff; line-height:1.6; font-weight:400;}
  .air b{color:var(--gold); font-weight:600;}

  /* 文明のかけら */
  .frags{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:10px;}
  @media(max-width:560px){ .frags{grid-template-columns:1fr;} }
  .frag{background:rgba(255,255,255,.04); border:1px solid rgba(224,181,74,.18); border-radius:14px; padding:16px 16px;
    backdrop-filter:blur(4px);}
  .frag .ft{font-weight:700; color:var(--accent2); font-size:14px; margin-bottom:6px; letter-spacing:.04em;}
  .frag .fx{font-size:13.5px; color:var(--dim); line-height:1.7;}

  /* 偉業カード */
  .wonder{margin-top:8px; border-radius:18px; padding:28px 24px; text-align:center; position:relative; overflow:hidden;
    background:linear-gradient(180deg, rgba(224,181,74,.16), rgba(180,140,40,.05));
    border:1px solid rgba(224,181,74,.45); box-shadow:0 0 60px rgba(224,181,74,.1) inset;}
  .wonder::before{content:"偉業 / WONDER"; position:absolute; top:12px; left:0; right:0; font-size:10px; letter-spacing:.4em; color:var(--gold); opacity:.7;}
  .wonder .we{font-size:64px; line-height:1; margin:18px 0 6px; filter:drop-shadow(0 8px 20px rgba(0,0,0,.5));}
  .wonder .wn{font-size:24px; font-weight:800; color:#fff; letter-spacing:.06em;}
  .wonder .wtext{font-size:14px; color:var(--ink); margin:12px auto 0; max-width:520px; line-height:1.8;}
  .wonder .weff{display:inline-block; margin-top:16px; font-size:12px; font-weight:800; letter-spacing:.05em;
    color:var(--gold); border:1px solid rgba(224,181,74,.5); border-radius:30px; padding:6px 16px;}

  /* イベントカード */
  .events{display:flex; flex-direction:column; gap:14px; margin-top:8px;}
  .ev{border-radius:16px; padding:18px 20px; position:relative; overflow:hidden;
    background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.1);}
  .ev .ehead{display:flex; align-items:center; gap:12px; margin-bottom:8px;}
  .ev .eemoji{font-size:34px; line-height:1; flex-shrink:0;}
  .ev .etitle{font-size:17px; font-weight:800; color:#fff; letter-spacing:.03em;}
  .ev .ekind{font-size:10px; font-weight:800; letter-spacing:.12em; padding:3px 9px; border-radius:20px; flex-shrink:0;
    border:1px solid currentColor;}
  .ev .estory{font-size:14px; color:var(--ink); line-height:1.8;}
  .ev .eeff{margin-top:10px; font-size:12.5px; color:var(--accent2); font-weight:700;}
  .ev .eeff::before{content:"▸ "; opacity:.7;}

  /* 種別カラー */
  .k-飛躍{color:#ffcf6a;} .k-報酬{color:#9fcf7a;} .k-近道{color:#7ad0c0;}
  .k-橋渡し{color:#7ab5e0;} .k-ピンチ{color:#e08a7a;} .k-クライマックス{color:#ffe08a;} .k-エンド{color:#c8a0e0;}

  /* EPOCH（飛躍・主役級）演出 */
  .ev.epoch{background:linear-gradient(135deg, rgba(224,181,74,.14), rgba(201,123,60,.06));
    border:1px solid rgba(224,181,74,.55); box-shadow:0 0 40px rgba(224,181,74,.12);}
  .ev.epoch::after{content:"EPOCH"; position:absolute; top:14px; right:-30px; transform:rotate(45deg);
    background:linear-gradient(90deg,var(--accent),var(--gold)); color:#3a2810; font-size:10px; font-weight:900;
    letter-spacing:.2em; padding:3px 36px; box-shadow:0 2px 10px rgba(0,0,0,.4);}
  .ev.epoch .etitle{background:linear-gradient(90deg,#fff,#ffd884); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .ev.epoch .ekind{display:none;}  /* EPOCHリボンと重複するため非表示 */
  .ev.epoch{animation:epochpulse 3.5s ease-in-out infinite;}
  @keyframes epochpulse{0%,100%{box-shadow:0 0 40px rgba(224,181,74,.1);}50%{box-shadow:0 0 70px rgba(224,181,74,.28);}}

  /* 終章 */
  #epilogue{text-align:center;}
  #epilogue .star{font-size:60px; animation:twinkle 3s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.6; transform:scale(1)}50%{opacity:1; transform:scale(1.15)}}

  /* CTA */
  #cta{height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  #cta .ctitle{font-size:clamp(28px,6vw,52px); color:#fff; letter-spacing:.06em; line-height:1.4;}
  #cta .csub{color:var(--dim); margin:18px 0 34px; letter-spacing:.1em; font-size:14px;}
  #cta a.play{display:inline-flex; align-items:center; gap:10px; text-decoration:none;
    background:linear-gradient(180deg,#f5d573,#e0b54a); color:#5a3d12; font-weight:900; font-size:17px;
    padding:16px 40px; border-radius:40px; box-shadow:0 8px 30px rgba(224,181,74,.35); letter-spacing:.05em; transition:transform .1s;}
  #cta a.play:active{transform:translateY(2px);}
  footer{text-align:center; color:#6f6450; font-size:11px; padding:40px 20px 70px;}
</style>
</head>
<body>
<div id="bgfx"></div>
<div id="grain"></div>
<div class="bar top"></div>
<div class="bar bot"></div>
<div id="prog"></div>
<nav id="nav"></nav>

<!-- HERO -->
<section id="hero" data-tint="#1a1410" data-accent="#c97b3c">
  <div class="embers" id="embers"></div>
  <div class="toptag rv blur">OFFICIAL STORY TRAILER</div>
  <div class="hero-poem mincho rv">一粒の火から、<b>星をまたぐ帝国</b>まで。</div>
  <h1 class="mincho rv">Time of Empire</h1>
  <div class="hero-sub rv">A CIVILIZATION, IN YOUR HANDS</div>
  <div class="scrollcue">SCROLL ▾</div>
</section>

<main id="story"></main>

<!-- CTA -->
<section id="cta" data-tint="#101a22" data-accent="#4a90d9">
  <div class="ctitle mincho rv">歴史は、まだ途中だ。</div>
  <div class="csub rv">続きを動かすのは、あなたの手。</div>
  <a class="play rv" href="index.html">▶ 帝国を建てはじめる</a>
</section>
<footer>Time of Empire — 文明史シナリオ予告編 / 本編シナリオは SCENARIO.md より</footer>

<script>
/* ===== シナリオデータ ===== */
const PROLOGUE = {
  kicker:"PROLOGUE — 序章",
  title:"はじまりの火",
  lead:"世界は、まだ名前を持っていなかった。",
  body:[
    "空には名づけられていない星がめぐり、川には呼ばれていない水が流れ、地平の向こうには、誰も歩いたことのない大地がただ広がっていた。そこには、ひとつだけ欠けているものがあった。「明日のことを思い悩む者」が、まだいなかったのだ。",
    "やがて立ち上がった小さな者たちは、爪も牙も貧しかった。けれど彼らには奇妙な力があった。<b>「覚えること」</b>ができたのだ。昨日うまくいったことを、明日もやってみようとした。この、ささやかな力こそが、やがて大地を耕し、星を読み、空を飛び、ついには惑星そのものを変えてしまう、すべての始まりだった。",
    "あるとき、雷が枯れ木を焼いた。皆が逃げ惑うなか、ひとりの者だけが足を止め、炎を見つめた。――もし、これを「飼う」ことができたら? その夜、世界で初めて、人間の手によって火が運ばれた。<b>自然を受け入れる生き物から、自然を作り変える生き物への、最初の一歩</b>だった。",
    "あなたは、その者たちの長(おさ)である。さあ、最初の薪をくべよう。歴史は、あなたがタップした、その瞬間から動きはじめる。"
  ]
};

const ERAS = [
  {
    no:"第1時代 / AGE I", name:"原始時代", en:"THE DAWN", emoji:"🛖",
    tint:"#211710", accent:"#d2772f", accent2:"#e0a44a",
    tag:"生き延びることそのものが、祝祭だった。",
    air:{
      lead:"風がすべてを支配していた。",
      body:[
        "雨が降れば濡れ、日が照れば焼かれ、獣が来れば逃げる。人々は手のひらほどの理由で生き、手のひらほどの理由で死んだ。それでも、火を囲む夜だけは違った。炎のまわりには、不思議と「明日」があった。",
        "この時代の人々は、毎日<b>「足りない」</b>を学んでいた。だからこそ、何かが「満ちる」瞬間の喜びは、後のどの時代よりも純粋だった。狩りが成功した夜。木の実が実った朝。新しい子が生まれた日。"
      ]
    },
    frags:[
      {t:"石を割る者たち",x:"ただの石ころが、叩き方ひとつで刃になる。人類最初の「技術」であり、最初の「職人」だった。"},
      {t:"言葉を編む者たち",x:"獣の鳴き真似が、いつしか「あそこに水がある」を伝える。見ていないものを共有する魔法。"},
      {t:"絵を描く者たち",x:"洞窟の壁に炭で獣を描く。記録であり、祈りであり、世界で最初の「芸術」だった。"}
    ],
    wonder:{emoji:"🗿", name:"巨石像", eff:"全生産 +15%（永久）",
      text:"食べられもしない、住めもしない石を、なぜ立てる? 理由は誰にも言えなかった。だが石が立った日、人々は悟った――「自分たちは、何かを“遺す”ことができる」。空腹の外側にある、最初の贅沢。人間が初めて作った「意味」だった。"},
    events:[
      {id:"01", emoji:"🔥", title:"火の手なずけ", kind:"飛躍", epoch:true,
        story:"雷に焼かれた枯れ木から、村人がおずおずと火種を運んでくる。村に、初めての焚き火が灯る。夜が怖くなくなり、獣が近づかなくなった。",
        eff:"食料が一時2倍。調理を覚え、以降の食料採取に永久ボーナス"},
      {id:"02", emoji:"🌾", title:"農耕のひらめき", kind:"飛躍", epoch:true,
        story:"こぼれた種が、捨て場の脇で勝手に芽吹いていた。「植えれば……生える?」――追いかけて狩るのではなく、待てば実る。人類の発想がひっくり返る瞬間。",
        eff:"畑を永久強化。定住が可能になり、人口上限が増える"},
      {id:"03", emoji:"🖐️", title:"はじめての言葉の刻印", kind:"近道",
        story:"洞窟の壁に、村でいちばん年老いた者が手形を押す。次の世代へ、「ここに我々がいた」と伝えるために。",
        eff:"資源ボーナス＋次の時代への要求が少し緩和"},
      {id:"04", emoji:"🐾", title:"大いなる移住", kind:"報酬",
        story:"獣の群れが季節とともに大移動する。村人は数日かけて後を追い、かつてない大猟を得た。",
        eff:"全資源が一時的に大量流入（留守ボーナス上乗せ）"}
    ]
  },
  {
    no:"第2時代 / AGE II", name:"古代", en:"THE ANCIENTS", emoji:"🏛️",
    tint:"#221d10", accent:"#cda23a", accent2:"#e6c45a",
    tag:"文明とは、つきつめれば「余りの分けあい方」の発明だった。",
    air:{
      lead:"種をまけば実ると知った人々は、もう川辺を離れられなくなった。",
      body:[
        "同じ土地に留まり、同じ畑を見守り、同じ墓に死者を葬る。「土地」という言葉が、初めて意味を持ちはじめた。そして定住は、思いがけないものを生んだ――<b>「余り」</b>だ。",
        "腹を満たしてなお、穀物が倉に残る。すると、食べ物を作らなくてもいい者が現れる。壺を作る者、石に印を刻む者、星をながめる者。こうして人は初めて「役割」を分けあった。村は町になり、町は都市になり、長は王と呼ばれるようになる。"
      ]
    },
    frags:[
      {t:"文字を発明した者たち",x:"粘土に葦を押しつけ収穫高を記録した。記憶は人とともに死ぬが、文字は死なない。時間を越えて語りかける手段。"},
      {t:"車輪を回した者たち",x:"「軸を通して、輪だけ回せたら?」 人間の力を何倍にも増幅する、最初の機械。"},
      {t:"青銅を鋳た者たち",x:"火で金属を溶かし、型に流す。地中の石から道具を「生み出す」術。"},
      {t:"星を読む者たち",x:"夜空の規則から、種まきと洪水の時を導いた。暦の誕生。時間を支配する者が、人を支配する。"}
    ],
    wonder:{emoji:"🛕", name:"大神殿", eff:"全生産 +20%（永久）",
      text:"王は「神々のために」と言った。だが神殿はもっと多くを成した。見ず知らずの他人どうしが、同じ神を仰ぎ、同じ祭りに集い、神殿の影のもとで「我ら」になる。石の建造物が、人の心をひとつにした。国家になるための、見えない接着剤。"},
    events:[
      {id:"05", emoji:"📜", title:"文字の誕生", kind:"飛躍", epoch:true,
        story:"倉の管理人が麦の数を覚えきれず、粘土に刻みを入れはじめる。やがて刻みは記号となり――文字になる。「これがあれば、死んでも、伝わる」。",
        eff:"知識が蓄積。以降すべての偉業の建設時間が永久短縮＋大量資源"},
      {id:"06", emoji:"🛞", title:"車輪と荷車", kind:"飛躍",
        story:"石切場の労働者が、丸太の上を石が転がるのを見て閃く。軸と輪を組んだ荷車が、ひとりの力を十人分に変える。",
        eff:"石と木の生産に永久ボーナス"},
      {id:"07", emoji:"⚒️", title:"青銅の時代", kind:"飛躍",
        story:"火の中で銅と錫が出会い、これまでにない硬い金属が生まれる。鋤は鋭くなり、道具という道具が一段上の世代へ。",
        eff:"全建物の生産効率が永久にアップ"},
      {id:"08", emoji:"⚖️", title:"はじめての法", kind:"報酬",
        story:"王が石柱に掟を刻ませる。「目には目を」。強者の暴力に、初めて言葉が手綱をかけた。",
        eff:"都市が安定し、生産ブースト＋人口上限増"},
      {id:"09", emoji:"⛵", title:"大いなる交易", kind:"報酬",
        story:"見知らぬ土地からの隊商が村を訪れる。余った穀物と、向こうの珍しい品を交換する。世界は、この村だけではなかった。",
        eff:"手持ちの最も少ない資源が一気に補充される"}
    ]

    e.style.left=(Math.random()*100)+"%";
    e.style.setProperty("--dx",(Math.random()*60-30)+"px");
    e.style.animationDuration=dur+"s";
    e.style.animationDelay=(-Math.random()*dur)+"s";
    const sc=.5+Math.random()*1.6; e.style.transform=`scale(${sc})`;
    box.appendChild(e);
  }
})();

/* ===== reveal on scroll ===== */
const io=new IntersectionObserver((ents)=>{
  ents.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
},{threshold:.18, rootMargin:"0px 0px -8% 0px"});
function observeReveals(){ document.querySelectorAll(".rv:not(.in)").forEach((el,i)=>{
  el.style.transitionDelay=((i%6)*0.06)+"s"; io.observe(el); }); }
observeReveals();

/* ===== 背景の色を、いま画面中央にある時代に合わせて変える ===== */
const tintEls=[...document.querySelectorAll("[data-tint]")];
const bgfx=document.getElementById("bgfx");
const root=document.documentElement;
function updateTint(){
  const mid=window.innerHeight/2;
  let cur=tintEls[0];
  for(const el of tintEls){
    const r=el.getBoundingClientRect();
    if(r.top<=mid && r.bottom>=mid){ cur=el; break; }
    if(r.top<=mid) cur=el;
  }
  root.style.setProperty("--tint", cur.dataset.tint);
  root.style.setProperty("--accent", cur.dataset.accent);
  if(cur.dataset.accent2) root.style.setProperty("--accent2", cur.dataset.accent2);
}

/* ===== 進捗バー＋ナビ ===== */
const prog=document.getElementById("prog");
const navEls=[...document.querySelectorAll("[data-nav]")];
const nav=document.getElementById("nav");
navEls.forEach((el,i)=>{ const a=document.createElement("a");
  a.href="#"; a.dataset.i=i;
  a.innerHTML=`<span>${el.dataset.nav}</span>`;
  a.onclick=(ev)=>{ ev.preventDefault(); el.scrollIntoView({behavior:"smooth"}); };
  nav.appendChild(a);
});
const navDots=[...nav.children];
function updateNav(){
  const mid=window.innerHeight/2; let active=0;
  navEls.forEach((el,i)=>{ if(el.getBoundingClientRect().top<=mid) active=i; });
  navDots.forEach((d,i)=>d.classList.toggle("active", i===active));
}

let ticking=false;
function onScroll(){
  if(ticking) return; ticking=true;
  requestAnimationFrame(()=>{
    const h=document.documentElement.scrollHeight-window.innerHeight;
    prog.style.width=(window.scrollY/h*100)+"%";
    updateTint(); updateNav(); ticking=false;
  });
}
window.addEventListener("scroll", onScroll, {passive:true});
window.addEventListener("resize", onScroll);
onScroll();
</script>
