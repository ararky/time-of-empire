<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>鼎（かなえ）</title>
<style>
  :root{
    --paper:#f2e9d6; --ink:#2a241c; --sub:#7a6f5a; --gold:#b08d3e; --indigo:#1a2740;
    --ac:#b08d3e;                 /* 時代のアクセント（JSで切替） */
    --line:rgba(120,100,60,.22);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow:hidden;}
  body{font-family:"Hiragino Mincho ProN","Yu Mincho",YuMincho,serif; background:#0d0f14;
    -webkit-font-smoothing:antialiased; color:var(--ink);}
  .screen{position:fixed; inset:0; display:none;}
  .screen.show{display:block;}
  button{font-family:inherit; cursor:pointer;}

  /* ===================== 表紙 ===================== */
  #cover{z-index:30; flex-direction:column; align-items:center; justify-content:center;
    padding:40px 30px; text-align:center; color:#e9dfc4;
    background:
      radial-gradient(120% 80% at 50% 12%, rgba(176,141,62,.18), transparent 60%),
      linear-gradient(180deg,#1c2b48, #131d33 70%, #0f1728);}
  #cover.show{display:flex;}
  #cover .frame{border:1px solid rgba(176,141,62,.5); border-radius:2px; padding:44px 26px; max-width:340px; width:100%;
    box-shadow:0 0 60px rgba(0,0,0,.5) inset;}
  #cover .kicker{font-size:11px; letter-spacing:.5em; text-indent:.5em; color:var(--gold); margin-bottom:26px;}
  #cover h1{font-size:96px; font-weight:500; letter-spacing:0; line-height:1.15; color:#f2e6c8;
    text-shadow:0 2px 20px rgba(0,0,0,.5);}
  #cover h1 rt{font-size:14px; letter-spacing:.55em; text-indent:.55em; color:var(--gold); margin-bottom:10px;}
  rt{font-size:.42em; letter-spacing:0; opacity:.85; font-weight:400;}
  #cover .sub{font-size:12.5px; color:#c9bd9c; letter-spacing:.08em; line-height:1.9; margin-top:20px;}
  #cover .days{font-size:11px; color:var(--gold); letter-spacing:.28em; margin-top:14px;}
  #cover .line{width:44px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:24px auto;}
  #cover input{font-family:inherit; text-align:center; font-size:15px; color:#f2e6c8; background:rgba(255,255,255,.04);
    border:none; border-bottom:1px solid rgba(176,141,62,.5); padding:7px 6px; width:170px; letter-spacing:.1em;}
  #cover input::placeholder{color:#8a8069;} #cover input:focus{outline:none; border-color:var(--gold);}
  #cover .as{font-size:11px; color:var(--sub); margin-top:8px; letter-spacing:.1em;}
  #cover .open{margin-top:32px; border:1px solid rgba(176,141,62,.6);
    background:rgba(176,141,62,.12); color:#f2e6c8; font-size:15px; letter-spacing:.3em; text-indent:.3em;
    padding:13px 30px; border-radius:2px; transition:background .2s;}
  #cover .open:active{background:rgba(176,141,62,.25);}

  /* ===================== ホーム ===================== */
  #home{z-index:20; background:var(--paper);
    background-image:radial-gradient(rgba(120,100,60,.05) 1px, transparent 1px); background-size:3px 3px;
    flex-direction:column;}
  #home.show{display:flex;}
  .h-top{display:flex; justify-content:space-between; align-items:center; padding:16px 20px 0; font-size:12px; color:var(--sub);}
  .h-top .ttl{letter-spacing:.18em;}
  .h-top button{border:none; background:none; color:var(--sub); font-size:12px; letter-spacing:.1em;}
  .h-mid{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px 28px; text-align:center;}
  .dedic{font-size:12.5px; color:var(--sub); letter-spacing:.12em; line-height:1.9; margin-bottom:30px;}
  .dedic b{color:var(--ac); font-weight:600;}
  .today-k{font-size:12px; letter-spacing:.5em; color:var(--ac); text-indent:.5em; margin-bottom:14px;}
  .today-n{font-size:64px; font-weight:500; letter-spacing:.1em; color:var(--ink); line-height:1;}
  .today-n .ji{font-size:24px; color:var(--sub); margin:0 .15em;}
  .today-era{font-size:13px; color:var(--sub); letter-spacing:.24em; margin-top:20px;}
  .today-ttl{font-size:26px; letter-spacing:.12em; color:var(--ink); margin-top:12px; font-weight:500;}
  .today-tease{font-size:13.5px; color:#6a614e; line-height:2; margin-top:20px; max-width:300px;
    max-height:5.5em; overflow:hidden;}
  .open-day{margin-top:34px; border:1px solid var(--ac);
    background:color-mix(in srgb, var(--ac) 12%, transparent); color:var(--ink);
    font-size:15px; letter-spacing:.28em; text-indent:.28em; padding:14px 36px; border-radius:2px; transition:.15s;}
  .open-day:active{background:color-mix(in srgb, var(--ac) 24%, transparent);}
  .allread{font-size:13px; color:var(--sub); letter-spacing:.14em; line-height:2;}
  .h-bot{padding:0 24px calc(20px + env(safe-area-inset-bottom));}
  .prog-row{display:flex; align-items:center; gap:12px; font-size:11px; color:var(--sub); letter-spacing:.08em;}
  .prog-bar{flex:1; height:2px; background:var(--line); border-radius:2px; overflow:hidden;}
  .prog-bar i{display:block; height:100%; background:var(--ac); border-radius:2px; transition:width .6s ease;}
  .h-links{display:flex; justify-content:center; gap:26px; margin-top:16px;}
  .h-links button{border:none; background:none; color:var(--sub); font-size:12.5px; letter-spacing:.14em; padding:6px;}

  /* ===================== 読書（頁めくり） ===================== */
  #reader{z-index:25; background:var(--paper);
    background-image:radial-gradient(rgba(120,100,60,.05) 1px, transparent 1px); background-size:3px 3px;}
  #reader.show{display:block;}
  #rbar{position:absolute; top:0; left:0; right:0; z-index:3; display:flex; justify-content:space-between; align-items:center;
    padding:calc(12px + env(safe-area-inset-top)) 18px 10px; pointer-events:none;}
  #rbar .era{font-size:11px; letter-spacing:.26em; color:var(--sub);}
  #rbar .x{pointer-events:auto; border:none; background:none; color:var(--sub); font-size:12px; letter-spacing:.1em;}
  #stage{position:absolute; top:0; left:0; right:0; bottom:0; overflow:hidden;}
  #reel{position:absolute; top:0; right:0; bottom:0; padding:64px 34px 52px;
    writing-mode:vertical-rl; -webkit-writing-mode:vertical-rl;
    font-size:21px; line-height:2.2; letter-spacing:.03em; color:var(--ink);
    transition:transform .42s cubic-bezier(.4,.0,.15,1);}
  .gten{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; height:100%;
    padding:0 34px; margin-left:10px;}
  .gten .gk{font-size:12px; letter-spacing:.4em; color:var(--sub); margin-right:26px;}
  .gten .gn{font-size:22px; letter-spacing:.32em; color:var(--ac); margin-right:18px; font-weight:500;}
  .gten .ge{font-size:15px; letter-spacing:.14em; color:var(--ink); margin-right:16px;}
  .gten .gs{font-size:12.5px; letter-spacing:.14em; color:var(--sub);}
  .etobira{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; height:100%;
    padding:0 26px; margin-left:8px; border-left:1px solid var(--line);}
  .etobira .no{font-size:13px; letter-spacing:.4em; color:var(--ac); margin-right:20px;}
  .etobira .ttl{font-size:30px; letter-spacing:.2em; color:var(--ink); font-weight:500; margin-right:8px;}
  .etobira .who{font-size:13px; color:var(--sub); letter-spacing:.14em; margin-left:16px;}
  .ebody{display:inline-block; height:100%;}
  .ebody p{margin-right:0; text-indent:1em;}
  .ebody b{font-weight:600;}
  /* 頁の端を覆う余白マスク（隣頁の行の見切れ防止） */
  .pmask{position:absolute; top:0; bottom:0; z-index:1; pointer-events:none;
    background:var(--paper);
    background-image:radial-gradient(rgba(120,100,60,.05) 1px, transparent 1px); background-size:3px 3px;}
  .pmask.l{left:0;} .pmask.r{right:0;}
  /* タップゾーン */
  .tap{position:absolute; top:0; bottom:0; width:38%; z-index:2;}
  .tap.next{left:0;} .tap.prev{right:0;}
  /* 頁インジケータ */
  #rdots{position:absolute; left:0; right:0; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:3;
    display:flex; justify-content:center; gap:7px; pointer-events:none;}
  #rdots i{width:5px; height:5px; border-radius:50%; background:var(--line); transition:.3s;}
  #rdots i.on{background:var(--ac); transform:scale(1.25);}
  .rhint{position:absolute; left:0; right:0; bottom:calc(34px + env(safe-area-inset-bottom)); z-index:3;
    text-align:center; font-size:10.5px; letter-spacing:.2em; color:var(--sub); pointer-events:none;
    animation:bob 2.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{opacity:.35; transform:translateX(6px)}50%{opacity:.85; transform:translateX(-2px)}}

  /* 今日は、ここまで（余韻） */
  #done{position:absolute; inset:0; z-index:5; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:40px 34px calc(40px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg, rgba(242,233,214,.86), var(--paper) 40%);
    -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px);}
  #done.show{display:flex;}
  #done .seal{font-size:12px; letter-spacing:.5em; color:var(--ac); text-indent:.5em; margin-bottom:22px;}
  #done .kk{font-size:22px; letter-spacing:.16em; color:var(--ink); font-weight:500;}
  #done .dtl{font-size:13px; color:var(--sub); letter-spacing:.14em; margin-top:16px; line-height:1.9;}
  #done .line{width:40px; height:1px; background:linear-gradient(90deg,transparent,var(--ac),transparent); margin:26px auto;}
  #done .nxt{font-size:13px; color:#6a614e; line-height:2; letter-spacing:.08em; max-width:280px;}
  #done .nxt .lbl{font-size:11px; color:var(--sub); letter-spacing:.24em; display:block; margin-bottom:6px;}
  #done .acts{display:flex; flex-direction:column; align-items:center; gap:14px; margin-top:30px;}
  #done .go{border:1px solid var(--ac); background:color-mix(in srgb, var(--ac) 12%, transparent); color:var(--ink);
    font-size:14px; letter-spacing:.22em; text-indent:.22em; padding:12px 30px; border-radius:2px;}
  #done .go:active{background:color-mix(in srgb, var(--ac) 24%, transparent);}
  #done .sub-links{display:flex; gap:24px;}
  #done .sub-links button{border:none; background:none; color:var(--sub); font-size:12.5px; letter-spacing:.14em;}
  #done .lock{font-size:12.5px; color:var(--sub); letter-spacing:.1em; line-height:2;}
  #done .peek{border:none; background:none; color:var(--ac); font-size:12px; letter-spacing:.16em; opacity:.75; margin-top:4px;}

  /* ===================== 目次（暦） ===================== */
  #toc{z-index:22; background:var(--paper); overflow-y:auto; -webkit-overflow-scrolling:touch;
    background-image:radial-gradient(rgba(120,100,60,.05) 1px, transparent 1px); background-size:3px 3px;}
  #toc.show{display:block;}
  .toc-top{position:sticky; top:0; display:flex; justify-content:space-between; align-items:center;
    padding:calc(14px + env(safe-area-inset-top)) 20px 14px; background:linear-gradient(180deg,var(--paper),rgba(242,233,214,.85));
    backdrop-filter:blur(3px); z-index:2;}
  .toc-top .t{font-size:14px; letter-spacing:.2em; color:var(--ink);}
  .toc-top button{border:none; background:none; color:var(--sub); font-size:12.5px; letter-spacing:.12em;}
  .toc-inner{padding:6px 18px calc(50px + env(safe-area-inset-bottom)); max-width:520px; margin:0 auto;}
  .era-block{margin-top:22px;}
  .era-head{margin-bottom:10px; padding-bottom:7px; border-bottom:1px solid var(--line);}
  .er1{display:flex; align-items:baseline; gap:10px;}
  .er1 .en{font-size:15px; letter-spacing:.18em; color:var(--ink);}
  .er1 .ed{margin-left:auto; font-size:10.5px; color:var(--sub); letter-spacing:.1em;}
  .er2{display:flex; align-items:baseline; gap:10px; margin-top:5px;}
  .er2 .ev2{font-size:11.5px; color:var(--eac); letter-spacing:.05em;}
  .er2 .ew{margin-left:auto; font-size:10.5px; color:var(--sub); letter-spacing:.08em;}
  .cells{display:grid; grid-template-columns:repeat(auto-fill, minmax(0,1fr)); gap:8px;}
  .cell{aspect-ratio:1/1; border:1px solid var(--line); border-radius:3px; display:flex; align-items:center; justify-content:center;
    font-size:14px; color:var(--sub); position:relative; transition:.15s; background:rgba(255,255,255,.15);}
  .cell.read{background:var(--eac); border-color:transparent; color:#fff;}
  .cell.open{border-color:var(--eac); color:var(--ink);}
  .cell.cur{box-shadow:0 0 0 2px var(--eac); font-weight:600; color:var(--ink);}
  .cell.lock{opacity:.4; color:var(--sub);}
  .cell.lock::after{content:""; position:absolute; inset:0;}
  .cell:not(.lock){cursor:pointer;}
  .cell:not(.lock):active{transform:scale(.93);}

  /* 序を読む用オーバーレイ */
  #jo{z-index:24; background:var(--paper); overflow-y:auto; -webkit-overflow-scrolling:touch;
    background-image:radial-gradient(rgba(120,100,60,.05) 1px, transparent 1px); background-size:3px 3px;}
  #jo.show{display:block;}
  .jo-wrap{max-width:520px; margin:0 auto; padding:calc(60px + env(safe-area-inset-top)) 34px 60px;}
  .jo-h{font-size:13px; letter-spacing:.5em; color:var(--ac); text-indent:.5em; text-align:center; margin-bottom:34px;}
  .jo-wrap p{font-size:16px; line-height:2.4; color:#3a3327; margin-bottom:20px; text-indent:1em;}
  .jo-wrap p.d{color:var(--ac); text-indent:0; font-size:14px; letter-spacing:.06em;}
  .jo-close{display:block; margin:36px auto 0; border:1px solid var(--ac); background:none; color:var(--ink);
    font-size:13px; letter-spacing:.24em; text-indent:.24em; padding:11px 30px; border-radius:2px;}
</style>
</head>
<body>

<!-- ========== 表紙 ========== -->
<div id="cover" class="screen show">
  <div class="frame">
    <div class="kicker">Ａ　ＮＯＶＥＬ</div>
    <h1><ruby>鼎<rt>かなえ</rt></ruby></h1>
    <div class="sub">飯を炊いた釜が、<br>天下の重さを量る。</div>
    <div class="days">全 九十日 ・ 一日に、一話</div>
    <div class="line"></div>
    <div class="sub" style="margin-top:0;">古墳から令和へ――<br>釜ひとつを継いだ一族の記録</div>
    <button class="open" id="open">ひらく</button>
  </div>
</div>

<!-- ========== ホーム ========== -->
<div id="home" class="screen">
  <div class="h-top">
    <span class="ttl">鼎（かなえ）</span>
    <button id="toCover">表紙</button>
  </div>
  <div class="h-mid">
    <div class="dedic" id="dedic"></div>
    <div class="today-k">本日の一話</div>
    <div class="today-n" id="todayN"></div>
    <div class="today-era" id="todayEra"></div>
    <div class="today-ttl" id="todayTtl"></div>
    <div class="today-tease" id="todayTease"></div>
    <button class="open-day" id="openToday">よ　む</button>
  </div>
  <div class="h-bot">
    <div class="prog-row">
      <span id="progTxt">0 / 90</span>
      <span class="prog-bar"><i id="progFill"></i></span>
      <span id="progPct">0%</span>
    </div>
    <div class="h-links">
      <button id="toToc">目 次</button>
      <button id="toJo">序 を よ む</button>
    </div>
  </div>
</div>

<!-- ========== 読書 ========== -->
<div id="reader" class="screen">
  <div id="rbar"><span class="era" id="rEra"></span><button class="x" id="rClose">✕　もくじ</button></div>
  <div id="stage">
    <div id="reel"></div>
    <div class="pmask l"></div>
    <div class="pmask r"></div>
  </div>
  <div class="tap prev" id="tapPrev"></div>
  <div class="tap next" id="tapNext"></div>
  <div id="rdots"></div>
  <div class="rhint" id="rhint">◃　タップで、めくる</div>
  <div id="done">
    <div class="seal">今日は、ここまで</div>
    <div class="kk" id="doneTtl"></div>
    <div class="dtl" id="doneDtl"></div>
    <div class="line"></div>
    <div class="nxt" id="doneNxt"></div>
    <div class="acts" id="doneActs"></div>
  </div>
</div>

<!-- ========== 目次 ========== -->
<div id="toc" class="screen">
  <div class="toc-top">
    <span class="t">目　次　―　九十日</span>
    <button id="tocClose">とじる</button>
  </div>
  <div class="toc-inner" id="tocInner"></div>
</div>

<!-- ========== 序 ========== -->
<div id="jo" class="screen">
  <div class="jo-wrap">
    <div class="jo-h">序</div>
    <div id="joBody"></div>
    <button class="jo-close" id="joClose">本文へ</button>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const DAY_MS=86400000;

/* ============ 序文 ============ */
const JO=[
  'ひとつの、鉄の釜がある。',
  '塩を焼き、飯を炊き、ときに武具さえ鋳(い)た。三本の脚で立つその釜を、一族は〈鼎(かなえ)〉と呼んだ。',
  '磐井(いわい)の乱。大化改新(たいかのかいしん)。元寇(げんこう)。応仁(おうにん)の乱。本能寺(ほんのうじ)。米騒動(こめそうどう)。',
  '歴史の年表が太い字で記す事件の、その行間で――釜を継いだ者たちは、何を煮て、誰を生かしたか。',
  'これは、その記録である。九十の夜に分けて、お読みください。',
];

/* ============ 時代（13） ============ */
const ERAS=[
  {name:'古墳時代', short:'古墳', who:'筑紫の浜 ・ 阿知',    ev:'磐井(いわい)の乱',        yr:'527', from:1,  to:5,  ac:'#c0883a'},
  {name:'飛鳥時代', short:'飛鳥', who:'飛鳥京 ・ 乳女',      ev:'乙巳(いっし)の変・大化改新', yr:'645', from:6,  to:10, ac:'#c2a13c'},
  {name:'奈良時代', short:'奈良', who:'造寺の飯場 ・ 麻呂',  ev:'大仏造立・長屋王の変',    yr:'729–752', from:11, to:16, ac:'#b09248'},
  {name:'平安時代', short:'平安', who:'都の市 ・ あこ',      ev:'保元・平治の乱',          yr:'1156–59', from:17, to:22, ac:'#a5768c'},
  {name:'鎌倉時代', short:'鎌倉', who:'博多の浜 ・ 又七',    ev:'元寇(げんこう)',          yr:'1274–81', from:23, to:30, ac:'#7f95c0'},
  {name:'室町時代', short:'室町', who:'焼ける京 ・ きく',    ev:'応仁(おうにん)の乱',      yr:'1467–77', from:31, to:37, ac:'#8a9a6a'},
  {name:'戦国',     short:'戦国', who:'鳥取城 ・ 弥一',      ev:'鳥取渇(かつ)え殺し・本能寺', yr:'1581–82', from:38, to:46, ac:'#c05a3c'},
  {name:'江戸時代', short:'江戸', who:'江戸の長屋 ・ さと',  ev:'天明(てんめい)の大飢饉',  yr:'1782–88', from:47, to:54, ac:'#5f8a76'},
  {name:'幕末',     short:'幕末', who:'横浜・京 ・ ちよ',    ev:'黒船〜大政奉還',          yr:'1853–67', from:55, to:62, ac:'#7a7c9c'},
  {name:'明治時代', short:'明治', who:'海軍の厨 ・ はる',    ev:'脚気(かっけ)論争・富国強兵', yr:'1877–1904', from:63, to:69, ac:'#c08a4a'},
  {name:'大正',     short:'大正', who:'一膳飯屋 ・ とみ',    ev:'米騒動・関東大震災',      yr:'1918–23', from:70, to:78, ac:'#94705c'},
  {name:'昭和',     short:'昭和', who:'配給と闇市 ・ すゑ',  ev:'配給・空襲・闇市',        yr:'1941–48', from:79, to:84, ac:'#6f96a0'},
  {name:'令和',     short:'令和', who:'街の定食屋 ・ 名を継ぐ者', ev:'一椀、還る',          yr:'いま', from:85, to:90, ac:'#8f8f7a'},
];
function eraOf(d){ return ERAS.find(e=>d>=e.from && d<=e.to); }

/* ============ 九十日の本文 ============ */
const DAYS=[
/* ─ 第一世 古墳・磐井の乱 1-5 ─ */
{t:'鉄と、塩', p:[
  '阿知(あち)の一族は、海の向こうから火を連れてきた。',
  '祖父(おおじ)の代に、加羅(から)の国から筑紫(つくし)の浜へ渡ってきた鍛冶(かじ)の一族だ。彼らはこの島の者がまだ知らぬ技を、二つ持っていた。ひとつは、砂鉄(さてつ)と炭を焚(た)いて赤い鉄(くろがね)を生むこと。もうひとつは、海の水を白い塩に変えること。',
  'その二つを、ひとつの釜が担っていた。',
  '父・多々良(たたら)が鋳(い)た、鉄の大釜だ。人が二人がかりでも抱えきれぬほど大きく、三本の脚でどっしりと地を掴(つか)む。父はそれを、加羅の言葉で〈鼎(かなえ)〉と呼んだ。',
  '昼、鼎は塩を焼く。母・志摩(しま)が汲(く)んだ海の水を注ぎ、藻(も)を焚(く)べ、ひと晩じゅう炊(た)きつめる。朝には釜の底に、雪のように白い塩が残る。',
  '夜、鼎は飯を炊く。',
  '筑紫を治める大首長(おおおびと)――筑紫君磐井(つくしのきみ いわい)の館(やかた)で宴(うたげ)があるたび、多々良の一族は呼ばれた。鼎で炊いた飯、塩を打った魚、海の藻を煮た汁。磐井は多々良の塩を、殊(こと)のほか気に入っていた。',
  '「多々良。お前の塩は、舌の上で二度光る」',
  '磐井はそう言って笑う男だった。この島の西の果て、筑紫の海の道をすべて握る男。海の向こう――加羅、百済(くだら)、新羅(しらぎ)から来る鉄も絹も、みな磐井の浜を通らねば、東の大和(やまと)へは行けない。',
  'その富で磐井は、途方もないものを造らせていた。',
  '生きているうちから、自分の墓を。小山ほどの塚(つか)の上に、石で刻んだ人や馬を幾つも立てた〈岩戸山(いわとやま)〉。阿知は父の使いで塩を運ぶたび、その石の人馬(じんば)を見上げた。',
  '「生きてるのに、墓を造るのか」と、阿知は父に聞いた。',
  '多々良は鞴(ふいご)を踏む足を止めずに言った。「己(おのれ)の力を、死んでも見せつけたい。……ああいう者は、たいてい、その力の絶頂(ぜっちょう)でしくじる」',
  '阿知、十三。その言葉の意味を知るのは、この年の秋である。',
]},
{t:'新羅(しらぎ)の、金', p:[
  '塩を運んだ帰りの浜で、阿知は、あまと会う。',
  '海人(あま)の一族の娘だ。舟から飛び降り、鮑(あわび)を口にくわえて笑う。潜(もぐ)ればひと息で海の底まで届くと自慢する。阿知の一族が海の水から塩を採(と)るなら、あまの一族は海そのものから食いものを採る。',
  '「あんたの塩、しょっぱすぎる」とあまは言った。',
  '「お前の獲(と)る魚が、水くさいんだ」と阿知は返した。',
  '二人はそういう憎まれ口をきいては、次の日もまた、同じ浜で会った。',
  'ある夕、浜の火で、あまは獲れたての鮑を焼いた。阿知が塩をひとつまみ、落とす。潮と脂の匂いが、ぱっと立った。あまは目を丸くして、それから黙って三つ食べた。旨いものは、人を黙らせる。',
  '「……あんたの塩、しょっぱすぎる」と、あまは四つ目を頬張りながら言った。',
  'それが、あまの「旨い」だということを、阿知はもう知っていた。',
  '――その頃、磐井の館に、海の向こうからひとりの使者が来ていた。',
  '新羅の、使者だった。',
  '両手に抱えきれぬほどの金と鉄の延べ板を、磐井の前に、うずたかく積んでいた。',
]},
{t:'海を、閉じる', p:[
  'その年、東の大和(やまと)の王が、大軍を起こした。',
  '六万、という数だった。海の向こうの加羅(から)の地で新羅(しらぎ)が暴れ、大和と結ぶ国々を喰(く)い荒らしている。それを討つため、大和の将・近江毛野臣(おうみのけなのおみ)が六万を率いて、筑紫の海を西へ渡ろうとしていた。',
  'その海の道を握るのが、磐井だった。',
  '新羅はそれを知っていた。だから、金を積んだ。――磐井よ、大和の軍を通すな。海を、閉じよ。',
  '磐井は、閉じた。',
  'ある朝、筑紫の浜から舟が一艘(いっそう)も出なくなった。磐井の兵が湊(みなと)という湊を押さえ、大和へ運ばれるはずの鉄も絹も貢(みつ)ぎ物も、すべて堰(せ)き止めた。海の道が、止まった。',
  '阿知の一族の暮らしも、その日から変わった。',
  '多々良の鼎は、もう宴の飯を炊かなくなった。代わりに朝から晩まで、鉄を打った。鏃(やじり)、矛(ほこ)、太刀(たち)。磐井の兵の、いくさ支度(じたく)のためだ。',
  '「なぜ、父はいくさの道具ばかり打つ?」',
  '阿知が問うと、多々良は赤い鉄を睨(にら)んだまま低く言った。「打たされているのだ。磐井様に逆らえば、この一族は明日、浜から消される」',
  '「……磐井様は、勝つのか」',
  '多々良は長いあいだ答えなかった。それから、ぽつりと言った。',
  '「西の海ひとつなら、磐井様のものだ。だが東の大和は――島じゅうの兵を、束(たば)にできる。海と、島と。どちらが大きいか、という話だ」',
]},
{t:'震える、声', p:[
  '海が閉じて、いちばんに苦しんだのは、名もなき民だった。',
  '鉄が入らねば、鍬(くわ)も鎌(かま)も作れない。塩が売れねば、米も買えない。浜の市(いち)から人が消えた。磐井の兵は威張(いば)り、蔵は肥(こ)え、その足元で、漁(りょう)を止められた海人(あま)たちが痩(や)せていった。',
  'あまの一族も、舟を出せずにいた。',
  '「魚が獲れても、運べない。運べても、買う者がいない」',
  '浜の陰で、あまは初めて笑わなかった。「磐井様の金と、あたしらの腹は、繋(つな)がってないんだね」',
  '阿知は隠していた塩を少し、あまの手に握らせた。この島で塩は、金と同じだ。',
  'あまはそれを見て、怒ったような、泣きそうな顔をした。',
  '「……あんた、こういう時に、そういうことをする」',
  'その夜、東の空が赤かった。',
  '大和の大軍が、ついに動いた報(しら)せだった。大和の王は、島でいちばんの武人を筑紫へ差し向けた。物部(もののべ)の――麁鹿火(あらかひ)。',
  '多々良は、鼎の底を静かに撫(な)でた。',
  '「阿知。よく聞け。この釜は、加羅から祖父(おおじ)が背負ってきた、一族の命だ」',
  '「父?」',
  '「何があっても、この鼎(かなえ)だけは離すな。塩の焼き方も、鉄の生み方も、みな、この釜が覚えている」',
  '父の声が震えているのを、阿知は初めて聞いた。',
]},
{t:'岩戸山(いわとやま)、燃ゆ', p:[
  'いくさは、筑紫の御井(みい)の郡(こおり)でぶつかった。',
  '物部麁鹿火(もののべのあらかひ)の兵と、磐井の兵。旗と旗、矛と矛。阿知は遠い丘の陰からそれを見た。海しか知らぬ磐井の兵は、島じゅうから集(つど)った大和の軍の数に、日ごとに押されていった。',
  '多々良の打った鏃(やじり)が飛んだ。多々良の打った矛が折れた。父の鉄は、人を殺(あや)めるために使われていた。塩を、飯を、人を生かすために火を焚(た)いてきた一族の鉄が、だ。',
  '数日で、決まった。',
  '磐井は、討たれた。生きて墓を築いた男は、岩戸山の石の人馬(じんば)を見上げる間もなく、露(つゆ)と消えた。海の道を握った富も、新羅の金も、何ひとつ彼を守らなかった。――力の絶頂で、しくじる。父の言葉の意味を、阿知はその秋に知った。',
  'だが、いくさが終わって、ほんとうの地獄が始まった。',
  '磐井に鉄を打った者。磐井に塩を納めた者。――多々良の一族は「賊(ぞく)に与(くみ)した者」として、狩られる側に回った。',
  '「浜を、出るぞ」',
  '多々良はその夜、鼎に縄をかけ、背に負った。人が二人がかりの釜を、痩せた背ひとつで。母・志摩が塩の種(たね)を、阿知が炭と砂鉄の袋を負い、一族は闇にまぎれて東へ逃げた。',
  '浜の外れで、あまが待っていた。',
  '「舟を出す」と、あまは言った。「大和の兵は陸(おか)を固めてる。海からなら、東へ逃げられる」',
  '「お前の一族は、いいのか。おれたちを匿(かくま)えば――」',
  '「磐井様の金と、あたしらの腹は、繋がってなかった」と、あまはあの夜と同じことを言って笑った。「だったら、あたしらが誰を助けようと、あたしらの勝手だろ」',
  '舟に鼎を積んだ。重さで、舟べりが沈んだ。',
  'その時、松明(たいまつ)が浜に湧(わ)いた。追っ手だった。',
  '矢が飛んだ。一本が闇を裂き、鼎の胴で甲高く跳ねて、火花が散った。鉄の肌に、浅い疵(きず)がひとつ残った。――この釜が負う、千五百年ぶんの疵の、最初の一つである。',
  '多々良は阿知を舟へ押し込むと、自分は浜へ残った。',
  '「父!」',
  '「釜を、東へ。……阿知、お前が次の火だ」',
  '多々良は鞴(ふいご)を踏むあの足で砂を蹴(け)って、松明の群れへ、逆に駆けていった。追っ手を舟から引き剥(は)がすために。',
  '舟が、出た。',
  '振り返ると、浜の松明がひとつの影を囲んでいくところだった。阿知は叫ばなかった。叫べば舟の在(あ)り処(か)が知れる。声を、腹の底で噛(か)み殺した。母が阿知の頭を胸に抱いた。母の手も、塩で荒れて硬かった。',
  'やがて、東の空が白んだ。',
  '海の上で阿知は、背に負うた鼎の冷たい鉄肌に額(ひたい)をつけた。矢の疵に、指が触れた。父の打った、一族の釜。塩を焼き、飯を炊き、そして人を生かしも殺しもした、鉄。',
  '「……おれが、次の火だ」',
  '――磐井の乱の、後(のち)。大和は二度と筑紫に海を閉じさせぬよう、磐井の子から糟屋(かすや)の地を取り上げ、そこに屯倉(みやけ)を置いた。王家の直(じか)の蔵である。以後、筑紫の塩も米も鉄も、遠い大和の王の物として数えられていく。海の道はもう、地方の首長(おびと)のものではない。',
  'その大きな政(まつりごと)の転がりの、ほんの片隅で、鉄の釜ひとつを負った少年の舟が、東の海を漕(こ)いでいた。',
]},
/* ─ 第二世 飛鳥・乙巳の変 6-10 ─ */
{t:'白い菓子(くわし)', p:[
  '乳(ち)を、煮つめる。',
  '百済(くだら)から渡った作り方だと、母は言った。牛の乳をひと晩とろ火で煮つめると、やがて白く、餅のように固まる。甘い。この島の誰も知らぬ、貴(あて)な菓子(くわし)だ。',
  'それを煮るのは、いつも、あの釜だった。',
  '三本の脚の、鉄の大釜。加羅(から)から祖々(おやおや)が背負ってきた〈鼎(かなえ)〉。海の水を塩に変え、飯を炊き、いまは乳を菓子に変える。乳女(ちため)の一族は、この釜ひとつを負って、筑紫(つくし)の浜から幾代もかけて、都のある飛鳥(あすか)まで流れついていた。',
  '縁の裏に、浅い、鏃(やじり)のかたちの疵(きず)が一つある。いつ、どうしてついたのか、乳女は知らない。祖母(おおば)は「海を閉じた年のものだ」と言っただけで、それきり黙った。',
  'いま鼎が炊く乳は、この国でいちばん力ある家の口に入る。蘇我(そが)の――入鹿(いるか)様の。',
  '「よいか、乳女」と母は釜の底を撫でて言った。「わたしたちは、勝つ家の飯を炊く。勝つ家が変われば、炊く相手も変わる。それだけの一族だ」',
  'その言葉の重さが、乳女には、まだわからなかった。',
  '厨(くりや)の水を運ぶのは、安(やす)という若者だった。蘇我の館に仕える、名もなき下(しも)の者。乳女が煮る白い菓子の、いちばん端(はし)の、固まりそこねたところを、安はいつも欲しがった。',
  '「そんな端、うまくもないだろう」',
  '「乳女の作るものは、端でも甘い」',
  '乳女は下を向いて、竈(かまど)の火を強くした。火のせいで顔が赤いのだと、思わせるために。',
]},
{t:'三韓(さんかん)の調(みつぎ)', p:[
  '蘇我の家は天(あめ)より高い、と人は囁(ささや)いた。',
  '入鹿様は帝(みかど)の御位(みくらい)さえ意のままにするという。逆らった王(みこ)の一族を、館ごと攻め滅ぼしたという噂も、厨まで流れてきた。誰も、蘇我には逆らえない。',
  '乳女は一度だけ、入鹿様を遠くから見た。',
  '沓(くつ)を鳴らして庭を横切る、若く、美しく、そして誰の目も見ない男だった。ひとが自分を恐れることに慣れきった顔。',
  'その入鹿様のために、大きな儀式(ぎしき)の支度(したく)が始まっていた。',
  '三韓(さんかん)――海の向こうの三つの国から、貢(みつ)ぎ物を捧げる使いが来る。その調(みつぎ)を、帝が板敷(いたじき)の宮で受ける。蘇我の威(い)を、内(うち)にも外にも示す、晴れの日だった。',
  '厨は、その日の膳(ぜん)で沸き立った。乳女は鼎で乳を煮た。ひと晩、ふた晩。これまでで、いちばん白い菓子ができた。',
  'だがその頃――宮の裏では、別の支度も進んでいた。',
  '中大兄(なかのおおえ)という王子(みこ)。中臣鎌足(なかとみのかまたり)という男。二人が闇の中で、幾度も額(ひたい)を寄せていた。厨の誰も、それを知らない。',
  '「明日は晴れるといい」と、水を運びながら安が言った。「乳女の菓子を、いちばんいい形で運びたい」',
  '晴れた。よく晴れた朝だった。',
]},
{t:'板敷(いたじき)の、血', p:[
  '儀式は、板敷の宮で厳(おごそ)かに始まった。',
  '三韓の使いが、うやうやしく文(ふみ)を読み上げる。帝は御簾(みす)の奥。入鹿様はその傍(かたわ)らに、太刀(たち)を解いて座していた。剣(つるぎ)を帯びぬのが、宮の作法(さほう)だった。',
  '乳女は厨で、膳の仕上げに白い菓子を並べていた。',
  'その時、宮のほうで――声とも悲鳴ともつかぬものが上がった。',
  '何かの倒れる音。走る足。刃(やいば)の、鈍い音。',
  '「入鹿様が……板敷で、討たれた……!」',
  '転げるように、下の者が厨へ報(しら)せに来た。中大兄の手の者が、儀式のただ中で、丸腰の入鹿様に斬りかかったのだ。帝の、目の前で。天より高いはずの男が、板敷に血を流して倒れていた。',
  '乳女の手から、白い菓子の皿が落ちた。',
  '割れた皿の上で、ひと晩かけて煮た甘い菓子が、土にまみれた。',
  '安は――と、乳女は思った。安は、宮のほうへ、膳を運びに行った。',
  '厨の外はもう、走る人と叫ぶ声で埋まっていた。誰も、乳女の落とした菓子を見なかった。',
]},
{t:'邸(やしき)、燃ゆ', p:[
  '翌日、蘇我の邸(やしき)が燃えた。',
  '入鹿様を失った父・蝦夷(えみし)は、館に火を放ち、みずから炎の中へ入ったという。天より高かった蘇我の家は、二日で煙になった。',
  '厨の者は散り散りに逃げた。勝つ家の飯を炊く一族は、負けた家とともに、焼かれる側にいた。',
  '「鼎を」と、母が叫んだ。',
  '煙の中を、母と乳女はあの鉄の釜に縄をかけ、二人がかりで運び出した。人が二人がかりの釜を負って、燃える邸の裏の垣(かき)を越える。',
  '垣の向こうで、母は乳女の背に、鼎を括(くく)りつけた。',
  '「東へ。次の、勝つ家を探して、東へ」',
  '「母さんは」',
  '「あとから行く。……厨に、まだ逃げ遅れた者がいる」',
  '母は乳女の頬を一度だけ煤(すす)だらけの手で挟(はさ)むと、燃える邸のほうへ、煙の中へ戻っていった。',
  '乳女は待った。垣の外で、日が暮れるまで待った。',
  '母は、来なかった。',
  '煙が晴れても、来なかった。焼けたのか、逃げたのか、生きているのか死んだのか――乳女はついに、知らずに終わる。ただ背には、鼎があった。母が括りつけた、鼎が。',
  '釜の胴に、火ぶくれのような爛(ただ)れがひとつ増えていた。蘇我の邸の火が、鉄に遺(のこ)した痕(あと)だった。',
]},
{t:'公(おおやけ)の、民', p:[
  '蘇我が滅んで、世(よ)の仕組みが変わった。',
  '中大兄と鎌足は、新しい政(まつりごと)を始めた。これまで豪族(ごうぞく)が私(わたくし)に抱えていた土地も民も、すべて帝(みかど)の、公(おおやけ)のものとする――大化(たいか)の改新(かいしん)。',
  '主(あるじ)を失った厨の者たちは、行き場をなくした。ある者は新しい役所の下働きに移され、ある者は田に帰された。主が変われば炊く相手も変わる。母の言った通りだった。ただ、母はもういなかった。',
  '新しい世の帳簿(ちょうぼ)には、田の数、民の数、税(みつぎ)の数が、几帳面(きちょうめん)に書き込まれていった。人が、名ではなく、数として、はじめて国に数えられた年だった。',
  '安のことは、わからなかった。板敷に膳を運びに行った下の者が、あの騒ぎのあと斬られたのか、逃げたのか、別の家に拾われたのか。乳女は幾度も尋ねたが、誰も、水運びの若者のことなど覚えていなかった。名のない者は、数にも入らない。',
  '乳女は、行き着いた東の里で、また竈(かまど)を築いた。鼎を据え、乳のかわりに、その土地の豆を煮た。',
  '白い菓子は、もう作らなかった。作れば、端を欲しがるあの声を、探してしまう。',
  '豆の汁は、塩気(しおけ)だけが、筑紫にいた頃と、同じ味がした。',
]},
/* ─ 第三世 奈良・大仏と長屋王の変 11-16 ─ */
{t:'飯(いい)を、炊く', p:[
  '千人ぶんの飯(いい)を、麻呂(まろ)は音で計(はか)る。',
  '大鍋(おおなべ)の湯が立てる、こまかい泡(あわ)の音。それが太く重くなったら、米が炊(た)けた合図だ。目では、間に合わない。造寺(ぞうじ)の工(たくみ)は千を超え、腹は日に三度、いっせいに空(す)く。',
  '麻呂の一族は、飯を炊く。加羅(から)から祖々(おやおや)が背負ってきた三本脚の鉄の釜――〈鼎(かなえ)〉を、いちばん大きな竈(かまど)の真ん中に据えて。',
  '釜には、疵(きず)が二つあった。縁の裏の、鏃(やじり)のかたちの古い欠け。胴の、火ぶくれのような爛(ただ)れ。麻呂も、その由来を半分しか知らない。母は「海と、火の年のものだ」と言って、それきり黙った。',
  '「手が覚えるまで、頭で数えるな」と、母は言った。「頭は疲れると間違える。手は、間違えない」',
  '麻呂の親指(おやゆび)は、塩むすびを千も握るうちに、ひとつまみの量を、もう覚えていた。考えなくても、同じ塩がこぼれる。',
  '麻呂と並んで握るのは、多恵(たえ)という女(おんな)だった。麻呂より、握りが速い。「あんたの塩は、いつも同じ。あたしのは、その日の風で変える」と、多恵は笑った。',
  'いま麻呂の炊く飯は、左大臣(さだいじん)・長屋王(ながやのおおきみ)の御邸(みやしき)の工に配られていた。都でいちばん学(がく)のある貴人(きじん)だという。',
  'その長屋王の名を、近ごろ、藤原(ふじわら)の御方々(おかたがた)が、苦々しげに口にする――と、飯場(はんば)の噂は言った。',
  '飯場の噂は、たいてい、都の異変(いへん)より、一日だけ早い。',
]},
{t:'長屋王(ながやのおおきみ)', p:[
  '長屋王を、麻呂は一度だけ近くで見た。',
  '瘦(や)せた工の列を眺めて、王(おおきみ)は差配(さはい)に命じたという。「工の飯を、けちるな。腹の減った手が刻む仏に、ほとけは宿らぬ」',
  'そういう主(あるじ)だった。麻呂は、その一言を、生涯忘れない。',
  'ある夜、都が、兵で埋まった。',
  '長屋王がひそかに呪(のろ)いを行い、国を傾けようとした――藤原の四人の御子息(ごしそく)が、そう帝(みかど)に訴え出たのだ。真(まこと)か、でっちあげか。確かめる間もなく、王の邸は兵に囲まれた。',
  '長屋王は、妻子とともに、みずから命を絶った。学も、位(くらい)も、何ひとつ、彼を守らなかった。',
  '翌朝、麻呂たち飯炊(いいた)きは、行き場を失った。飯を配る工も、飯を命じる主も、一夜で消えた。',
  '長屋王が消えて、都は藤原の御一門(ごいちもん)のものになった。四人の御子息が、天(あめ)の下(した)を分けて握った。',
  '飯場の年寄りが、冷えた灰を見つめて呟(つぶや)いた。「人を、あんなふうに消した家は……いつか、同じ数だけ、何かに消される」',
]},
{t:'瘡神(かさがみ)', p:[
  '瘡神(かさがみ)は、西の海から都へ這(は)い上ってきた。',
  '身に赤い瘡(かさ)が噴き出し、熱に焼かれて、人が面白いように死んだ。筑紫(つくし)から始まった疫(えき)は街道を上り、都に入り、身分(みぶん)の上下(じょうげ)を、まるで問わなかった。',
  '麻呂は、病(やまい)の者に粥(かゆ)を炊いた。鼎に朝から晩まで火を入れ、薄い粥をひたすら炊いた。食えば助かるわけではない。何もせずに見ているよりは、まし、というだけの粥だった。',
  '炊きつづけて、鼎の底に、細い罅(ひび)が一本、入った。少ない人数のために、大きすぎる火を焚(た)きすぎた年の疵だった。',
  '多恵が、瘡に罹(かか)った。',
  '麻呂は、いちばん薄い、いちばん飲みやすい粥を、多恵のために炊いた。親指が覚えた塩を、ひとつまみ。多恵はそれを一口飲んで、「……やっぱり、いつも同じ塩」と言い、笑おうとして、笑いきれずに、目を閉じた。',
  'その同じ疫で、藤原の四人の御子息が、みな、死んだ。',
  '長屋王を消した四人が、一人残らず瘡神に消された。天の下を分け握った手が、名もなき工や、多恵と、同じ床(とこ)で、同じ瘡に焼かれて死んだ。灰を見つめた年寄りの言葉は、七年で当たった。',
  '瘡神は、位を、読まなかった。',
]},
{t:'うつろう、都', p:[
  '帝(みかど)は、恐れておられた。',
  '長屋王の祟(たた)りか、瘡神の穢(けが)れか。聖武(しょうむ)の帝は、都を次々と移された。恭仁(くに)へ、難波(なにわ)へ、紫香楽(しがらき)へ。宮(みや)が動くたび、民はそれを担いで運ばされた。',
  '都ひとつ動かすのに、幾万の手が要る。材木を伐(き)り、道を均(なら)し、石を運ぶ。田を耕す手が、そのぶん減る。税(みつぎ)は変わらず、課役(かえき)ばかりが増える。',
  '耐えかねた百姓(ひゃくしょう)は、田を捨てて逃げた。浮浪(ふろう)、逃亡(とうぼう)――帳簿(ちょうぼ)から、人が次々と消えていった。',
  '麻呂は、動く宮のあとを追って、鼎を担いで歩いた。据えては炊き、壊しては運び、また据える。罅(ひび)の入った釜は、それでも飯を炊きつづけた。',
  '西では、藤原の生き残りが兵を挙げて、敗れた。世は、乱れていた。',
  '飯だけは、乱れても要る。乱れれば乱れるほど、要る。',
]},
{t:'大(おお)き仏(ほとけ)', p:[
  '帝は、大(おお)きな仏(ほとけ)を造ると仰(おお)せになった。',
  '国じゅうの銅(あかがね)を集めて溶かし、盧舎那(るしゃな)の大仏(だいぶつ)を鋳(い)る。人の背丈の十(とお)ぶんも高い、金色(こんじき)の仏を。瘡神に瘦せ、都移りに疲れた国を、その仏で救うのだと。',
  '延(の)べ、幾百万(いくひゃくまん)の手が動いた。銅を運ぶ手、炭を焼く手、鋳型(いがた)を築く手。麻呂は、その手たちの腹を炊いた。',
  '仏に塗る金(きん)が、遠い陸奥(みちのく)で見つかったと、都は沸いた。仏は、まばゆく光るだろう。',
  'その同じ年、麻呂の炊く粥は、また一段、薄くなった。',
  '麻呂の親指は、もう皺(しわ)だらけだった。それでも、塩の量だけは間違えない。手が覚えている。頭より先に、手が。',
  '麻呂の傍(かたわ)らには、いつからか、小さな子が飯を握っていた。名を、まだ持たぬほどの子だ。麻呂の握りを、黙って見ていた。',
  '「見て覚えろ」とは、言わなかった。手は、見ているだけで、覚える。',
]},
{t:'手が、覚えている', p:[
  '天平(てんぴょう)勝宝(しょうほう)四年。大仏の、開眼(かいげん)の日が来た。',
  '万(よろず)の僧が経(きょう)を上げ、天竺(てんじく)から渡った僧が、大仏の瞳(ひとみ)に筆で黒目を入れた。金色の仏が、目を開いた。都は、歓喜(かんき)に沸いた。',
  '麻呂は、その日、大仏を見ていない。',
  '飯場の竈の前で、いつものように鼎に火を入れ、湯の泡の音を聞きながら――ふいに、崩(くず)れるように倒れた。',
  '瘡(かさ)の名残(なごり)の熱だったのか、ただ疲れきった体だったのか。誰にもわからなかった。麻呂は、何も言い遺(のこ)さなかった。飯の炊き方も、塩の量も、疵の由来も、何ひとつ言葉にしないまま逝(い)った。',
  '倒れた麻呂の横で、小さな子が、竈の前に立った。',
  '泡の音が、太く、重くなっていた。それが炊けた合図だと、子は教わっていない。ただ幾百日、麻呂の背中ごしに、聞いていた。',
  '子の手が、動いた。頭より、先に。塩を、ひとつまみ。麻呂の親指と、同じ量を。',
  '金色の大仏は、いまも坐(ざ)している。開眼から千三百年、まばゆく。',
  '飯場の竈では、名も持たぬ子が、罅(ひび)の入った鼎に火を入れていた。塩を、ひとつまみ。手が、量を覚えていた。麻呂が、そうであったように。その母が、そうであったように。',
]},
/* ─ 第四世 平安・保元平治の乱 17-22 ─ */
{t:'市(いち)が、立つ', p:[
  '朝の市(いち)は、匂いで、都の具合(ぐあい)がわかる。',
  'あこは、東(ひがし)の市に、煮炊(にた)きした物を並べて売る。芋(いも)の粥(かゆ)、干(ほ)した魚、木の実を甘く煮た果子(くわし)。竈(かまど)の真ん中には、母から継いだ三本脚の鉄の釜――〈鼎(かなえ)〉。縁の裏に鏃(やじり)の疵、胴に火ぶくれ、底に細い罅(ひび)。三つの疵の由来を、あこも、半分しか知らない。',
  '都が安(やす)らかな年は、甘い果子が、よく売れる。人は、余裕(よゆう)があると、甘いものを買う。',
  'その甘い果子が売れ残り、代わりに塩と干物(ひもの)が飛ぶように消える朝が、ときどき、ある。人が、蓄(たくわ)えはじめた朝だ。何かを、恐れはじめた朝だ。',
  '「市が立つかぎり、都は死なない」と、あこは子らに言った。「けど、市は、都より先に、怯(おび)える」',
  '息子の石丸(いしまる)は、店番よりも、通りを見ていた。近ごろ市を、太刀(たち)を佩(は)いた武者(むしゃ)が、肩で風を切って歩く。石丸の目は、その武者を追っていた。',
  '娘の阿佐(あさ)は、黙って、鼎の灰を掻(か)いていた。火の加減を読む目が、母に似ていた。',
  '「上(かみ)で、何か、あるらしい」と、隣の干物売りが囁(ささや)いた。「帝(みかど)と、上皇(じょうこう)さまが、仲違(なかたが)いだと」',
  '甘い果子が、その朝、いつもより、売れ残った。',
]},
{t:'牛車(ぎっしゃ)と、太刀(たち)', p:[
  'ひと昔前、都の通りは、牛車(ぎっしゃ)のものだった。',
  '簾(すだれ)の奥に貴人(きじん)を乗せ、絹の匂いをこぼして、ゆるゆると過ぎていく。市の者は道を空け、頭(こうべ)を垂れた。雅(みやび)が、都を治めていた。',
  'いま、通りを分けるのは、太刀だった。',
  '崇徳(すとく)の上皇(じょうこう)と、後白河(ごしらかわ)の帝(みかど)。位(くらい)をめぐる二人の争いは、貴人どうしの言葉では、片がつかなかった。両方が、武者を呼んだ。',
  '源(みなもと)と、平(たいら)。武者たちは、兄と弟、父と子で、右と左に分かれ、都のただ中で斬り合った。',
  '一夜で、片がついた。崇徳の上皇は負けて、遠い讃岐(さぬき)へ流された。',
  '貴人の争いを、貴人が裁(さば)けず、武者が刀で裁いた。都の者は、その朝、はっきりと知った。――強いのは、もう、雅ではない。',
  '市から、甘い果子が消えた。塩と干物ばかりが、飛ぶように売れた。',
  '石丸の目は、いよいよ輝いていた。「見たか。武者が、上皇さまを、動かしたんだ」',
  '「人を殺した者が、偉くなる世を、見たいか」とあこは言った。石丸は、答えなかった。',
  '答えないことが、答えだった。',
]},
{t:'父を、斬(き)る', p:[
  '乱のあと、都に、久しく絶えていたものが甦(よみがえ)った。',
  '死罪(しざい)である。都では長く、人を斬る刑(けい)は行われずにきた。それが、この乱を境(さかい)に、戻ってきた。',
  '勝った側の武者――源(みなもと)の義朝(よしとも)は、負けた側についた実(じつ)の父を、みずからの手で斬るよう命じられた。',
  '父を、子が、斬った。',
  'それが、石丸の憧(あこが)れる、武者の世の作法(さほう)だった。',
  'あこは、石丸に、その話を黙って聞かせた。「お前が憧れるのは、父を斬れと命じられる世だ」',
  '石丸はしばらく黙り、それから言った。「……それでも、強いほうが、いい」',
  '石丸の背が、その頃から少しずつ、家から離れていった。',
]},
{t:'都が、燃える', p:[
  '三年(みとせ)の、のち。今度は、勝った側どうしが割れた。',
  '平治(へいじ)の乱。平(たいら)の清盛(きよもり)と、源(みなもと)の義朝(よしとも)。都は、また戦場(いくさば)になった。',
  '御殿(ごてん)が焼かれ、火が風に乗って、市(いち)へも降ってきた。',
  '武者の一隊が、逃げ道を求めて市になだれ込んだ。店が蹴倒(けたお)され、人が踏まれ、あこは鼎を庇(かば)って、竈に覆(おお)いかぶさった。',
  '馬蹄(ばてい)と怒号(どごう)のなか、抜き身の太刀が、鼎の縁を鋭く掠(かす)めた。金気(かなけ)の音がして、鉄に、細い刀傷(かたなきず)が一つ残った。武者が、市に遺(のこ)していった疵だった。',
  '火の収まった市で、あこは石丸を探した。',
  '石丸は、いなかった。焼けた店の柱に、太刀の稽古(けいこ)に使っていた木の棒だけが、立てかけてあった。',
  '隣の者が言った。「息子さん、武者の隊について行きなさった。……止められる顔じゃ、なかった」',
  '鼎の新しい刀傷を、あこは指でなぞった。息子が選んだ世が、遺していった疵を。',
]},
{t:'平氏(へいし)の、世', p:[
  '平治の乱は、清盛(きよもり)が勝った。',
  '源の義朝は、東(あづま)へ逃げる途中で殺され、その幼い子は遠くへ流された。都は、平(たいら)の一門(いちもん)のものになった。',
  '「平氏(へいし)にあらずんば、人にあらず」――そう言い放つ者さえ現れた。清盛は、武者の身から、太政大臣(だじょうだいじん)にまで昇(のぼ)りつめた。',
  '市の甘い果子は、また売れるようになった。ただし買うのは、貴人ではなく、平氏の郎党(ろうとう)たちだった。牛車の代わりに、太刀が、通りを悠々(ゆうゆう)と行く。',
  '石丸の便(たよ)りは、なかった。平治の乱で死んだ武者のなかに、名もなき若者が幾人いたか、誰も数えていない。あこは、石丸が生きているのか死んだのか、ついに知らない。',
  '娘の阿佐(あさ)は、いつのまにか、鼎の火を、母よりうまく操(あやつ)るようになっていた。',
  '男は、刀に。娘は、火に。この一族の釜は、そうして、思わぬほうへ継がれようとしていた。',
]},
{t:'継ぐ、手', p:[
  'あこは、老いた。',
  '市に立つ足が重くなった朝、あこは鼎の前に、阿佐を呼んだ。',
  '「これは、お前が継げ」',
  '「兄(あに)さんの、ものでは」と阿佐は言った。',
  '「石丸は、火を捨てて、刀を選んだ。刀は、腹を満たさない」あこは、鼎の四つの疵を、順に指した。「この釜は、飯を炊く者にしか、継げない」',
  '男の子から、女の子へ。刀に流れた血筋(ちすじ)を迂回(うかい)して、鼎は、娘の手に渡った。',
  '阿佐が、火を入れた。泡の音を聞き、親指で塩を計(はか)る。母の、そのまた母の、手つきで。',
  'そして武者の世は、まだ始まったばかりだった。やがて平氏も奢(おご)り、驕(おご)る者の常(つね)として、次の武者に食われていく。だが、それはまた、別の疵の話だ。',
  '今日の市では、阿佐の炊いた芋粥(いもがゆ)が、湯気を上げている。それを、都の名もなき腹が、ひとつ、またひとつと、満たしていく。',
  '市が立つかぎり、都は、死なない。',
]},
/* ─ 第五世 鎌倉・元寇 23-30 ─ */
{t:'兵糧(ひょうろう)', p:[
  '槍(やり)で始まるいくさも、終わらせるのは、飯(めし)だ。',
  '又七(またしち)は、そう信じている。博多(はかた)の浜で、御家人(ごけにん)の陣(じん)に兵糧(ひょうろう)を運ぶ、賄い方(まかないかた)だ。',
  '賄い方の腕は、旨(うま)い飯を炊くことではない。腐(くさ)らぬ飯を、遠くまで届けることだ。米を蒸して干した干飯(ほしいい)、味噌(みそ)を丸めて乾かした味噌玉(みそだま)、塩で締めた魚。水さえあれば、いつでも腹になる。',
  '干飯を蒸すのも、味噌を練るのも、あの三本脚の鉄の釜だ。〈鼎(かなえ)〉。縁の鏃(やじり)疵、胴の火ぶくれ、底の罅(ひび)、そして縁の刀傷(かたなきず)。四つの疵の由来を、又七も半分しか知らぬ。祖母(おおば)は「海と、火と、病(やまい)と、刀の年のものだ」と言って、それきりだった。',
  '又七の兵糧を、いちばんよく食うのは、六郎(ろくろう)という若い御家人だった。わずかな田を賜(たまわ)る代わりに、いくさとなれば命を的(まと)に戦う。御恩(ごおん)と、奉公(ほうこう)。それが、武士(もののふ)の約束事だった。',
  '「又七の味噌玉があれば、おれはどこまでも戦える」と、六郎は笑った。婚(こん)して間もない若い妻(つま)が、その隣で、恥ずかしそうにしていた。',
  'その年、海の向こうから、途方もない報(しら)せが来た。蒙古(もうこ)。高麗(こうらい)。幾百の船が、この博多を目指しているという。',
  '又七は、蔵(くら)の干飯を数えなおした。足りるか、足りぬか。いくさは、まだ槍を抜く前から、始まっていた。',
]},
{t:'沖(おき)の、船', p:[
  'ある朝、博多の沖(おき)が、船で埋まった。',
  '見わたすかぎり、蒙古と高麗の軍船(ぐんせん)。数は、味方の幾十倍とも知れぬ。六郎は鎧(よろい)を締め、又七の握った握り飯を懐(ふところ)に入れて、浜へ駆けた。',
  '戦(いくさ)の作法(さほう)が、違った。御家人が名乗(なの)りを上げ、一騎(いっき)で進み出ると、蒙古の兵は束(たば)になって、いっせいに矢を射かけてきた。毒(どく)を塗った矢。短い弓。そして――',
  '鉄(くろがね)の玉が、宙で割れた。轟音(ごうおん)と、煙と、火。「てつはう」と、誰かが叫んだ。誰も見たことのない武器だった。',
  '又七の陣にも、それは飛んできた。炸(はじ)けた鉄の欠片(かけら)が、兵糧を積んだ鼎の胴を、鋭く抉(えぐ)った。四つだった疵が、五つになった。海の向こうの鉄が遺(のこ)していった、凹(へこ)みだった。',
  '一日、戦って、日が暮れた。夜のうちに、蒙古の船は沖へ退(ひ)いた。嵐が来たとも、様子を見たとも言われた。とにかく朝には、海は静かになっていた。',
  '助かった、と誰もが思った。又七だけが、退いた船の数を数えて思った。――あれは、退いたのではない。仕切り直しに、行っただけだ。',
]},
{t:'石を、積む', p:[
  '幕府(ばくふ)は、海際(うみぎわ)に、石の壁(かべ)を築けと命じた。',
  '二度目の来襲(らいしゅう)に備え、博多の浜に、延々と石の防塁(ぼうるい)を積む。その石も、人足(にんそく)も、費(つい)えも――すべて御家人が、みずから出す。褒美(ほうび)は、ない。',
  '加えて、異国警固番役(いこくけいごばんやく)。御家人は順ぐりに、この浜を幾月も守り続けねばならぬ。田を耕す間も惜しんで。',
  '六郎は、割り当てられた石を積むために、銭(ぜに)を借りた。田を、質(しち)に入れて。',
  '「戦って、勝った。なのに、なぜ、こちらが痩(や)せていくのだ」と、六郎は石を担ぎながら呟(つぶや)いた。又七は、答えを持たなかった。',
  '又七は、石を積む御家人たちに、味噌玉を配って歩いた。せめて、腹だけでも。',
  '壁は、日ごとに伸びていった。御家人の田は、日ごとに減っていった。',
]},
{t:'二度目(ふたたび)の、海', p:[
  '七年(ななとせ)ののち、海が、また埋まった。',
  '前より、はるかに多い船だった。二手(ふたて)に分かれた蒙古の大軍。四千余(よ)の船とも言われた。世に、これほどの船いくさは、なかった。',
  'だが今度は、石の壁があった。蒙古の兵は、浜に上がれなかった。御家人たちは壁の上から小舟で夜襲(やしゅう)をかけ、海の上で、幾日も、幾日も戦った。',
  'いくさが長引けば、兵糧が細る。又七は蔵をはたき、干飯を薄め、味噌玉を割って配った。「あと五日ぶん」「あと三日ぶん」――蔵の底が、見えはじめていた。',
  '六郎は、小舟で海へ出るたび、又七の味噌玉を懐に入れた。「これを食う間は、死なん」と言って。',
  '海の上の戦は、もう二月(ふたつき)に及んでいた。人も、飯も、限界だった。',
]},
{t:'神風(かみかぜ)', p:[
  'その夜、天(てん)が、割れた。',
  '嵐(あらし)だった。途方もない野分(のわき)が、博多の海を荒れ狂った。壁に阻(はば)まれて浜に上がれず、海に浮かんだままだった蒙古の大船団(だいせんだん)は、木の葉のように砕(くだ)け、渦(うず)に呑(の)まれて沈んでいった。',
  '朝、海は、船の残骸(ざんがい)で埋まっていた。生き残った蒙古の兵は、わずかだった。「神風(かみかぜ)だ」と、誰かが叫んだ。「神が、この国を守られた」。',
  '六郎は、生きて浜に帰ってきた。痩せて、髭(ひげ)だらけで、それでも笑っていた。「又七! おれは、国を守ったぞ!」',
  '又七は、その手に、ありったけの飯を握って持たせた。この日ばかりは干飯ではなく、炊きたての、白い飯を。',
  '六郎は、それを、涙を流して食った。――この飯が、六郎の食う最後の白い飯になるとは、又七も、まだ知らなかった。',
]},
{t:'恩賞(おんしょう)は、来ない', p:[
  'いくさが終われば、恩賞(おんしょう)が出る。御家人は、そう信じていた。',
  'だが此度(こたび)のいくさには、奪(うば)った土地が、なかった。海の向こうから来た敵を、海へ追い返しただけ。分け与える田が、どこにもないのだ。',
  '国を守った御家人たちに、褒美は来なかった。来たのは、二度のいくさの借財(しゃくざい)と、壁を積んだ費えと、警固(けいご)で耕せなかった、痩せた田だけだった。',
  '六郎は、質に入れた田を、取り戻せなかった。利(り)が利を生み、借りは膨(ふく)らむばかりだった。あれほど胸を張った若い御家人が、目に見えて貧(まず)しくなっていった。',
  '戦のあいだは、飯があった。勝ったあとに、飯が消えた。',
  '御家人が痩せれば、その飯を賄う又七も痩せる。兵糧を買う銭が、どこからも出なくなった。',
  '槍で始まったいくさは、飯で終わる。――ただし、勝った側の飯が尽きて終わる。そんないくさもあるのだと、又七は、六十を過ぎて知った。',
]},
{t:'徳政(とくせい)', p:[
  'とうとう、幕府(ばくふ)は令(れい)を出した。',
  '御家人の借財を帳消(ちょうけ)しにする。徳政(とくせい)、という。売った田を、ただで取り戻してよい、と。',
  'だが、それで救われはしなかった。ただで取り上げられると知れば、もう誰も、御家人には銭を貸さない。次に困(こま)ったとき、借りる先さえなくなった。御家人の困窮(こんきゅう)は、かえって深くなった。',
  '六郎は、ついに田を離れた。妻を連れ、博多を出て、どこへともなく去っていった。別れぎわ、又七にこう言った。「又七。おれが守った国は、おれを守ってはくれなかったな」。',
  '又七は、餞(はなむけ)に、味噌玉をありったけ持たせることしか、できなかった。',
  '国を救った御家人に報いることのできぬ幕府に、御家人は静かに心を離していった。御恩と奉公の約束が、ほどけていく。鎌倉の御政道(ごせいどう)は、この痩せた浜から、ゆっくりと傾きはじめた。',
  '又七の鼎には、五つの疵。だが、いちばん深い疵は、鉄では、なかった。',
]},
{t:'老いた、手', p:[
  '又七は、老いた。',
  '目が霞(かす)み、味噌を練る手が震えるようになった。ある日、又七は、鼎の前に孫(まご)を呼んだ。',
  '死んで継がせるのではない。生きているうちに、この手で教えて、渡す。それが、又七の決めたことだった。',
  '「いいか」と、又七は孫の手を取って、味噌の練り方を教えた。「賄い方の腕は、飯のある時にはいらん。飯の、ない時だ。何もない時に、それでも人を生かす。それが、賄い方のいくさよ」',
  '孫は、まだその言葉の重さがわからぬ顔をしていた。又七も、若い頃はそうだった。いつか飢(う)えた戦場(いくさば)で、この言葉の意味を、この子は身をもって知るだろう。',
  '又七は、五つの疵の鼎に、もう一度、火を入れた。孫と二人、老いた手と小さな手で、同じ味噌を練った。',
  'やがて、御家人を飢えさせた幕府もまた、飢えた武者たちに倒される。強い者が上を食う、下剋上(げこくじょう)の世は、この浜の飢えから、もう芽を出していた。',
  'だが、それはまだ、先の話だ。今日は、味噌玉が二百。老いた手が、それを丸め終える。',
]},
/* ─ 第六世 室町・応仁の乱 31-37 ─ */
{t:'四条流(しじょうりゅう)', p:[
  '鯉(こい)は、手を触れずに捌(さば)く。',
  '真魚箸(まなばし)と包丁(ほうちょう)だけで、鱗(うろこ)を落とし、身を開き、形を整える。指の脂(あぶら)ひとつ、魚に移さぬ。四条流(しじょうりゅう)の、庖丁道(ほうちょうどう)。きくは、その末端(まったん)に連なる、女(おんな)の庖丁人(ほうちょうにん)だった。',
  '公家(くげ)の饗(あるじ)、寺(てら)の斎(とき)。京(みやこ)の貴(あて)なる膳(ぜん)を、きくは預かった。切り口の美しさで、身分が決まる。そういう料理だった。',
  '雅(みやび)な庖丁式(ほうちょうしき)の裏で、飯や汁を炊くのは、母から継いだ三本脚の鉄の釜――〈鼎(かなえ)〉。五つの疵(きず)がある。鏃(やじり)、火ぶくれ、罅(ひび)、刀傷(かたなきず)、そして海の向こうの鉄が抉(えぐ)った凹(へこ)み。由来を、きくも半分しか知らぬ。',
  '師(し)の宗心(そうしん)は、口癖のように言った。「包丁は、切るためのものではない。活(い)かすためのものだ」。若いきくには、その意味が、まだ半分しか、わからなかった。',
  'その年、稲(いね)が実らなかった。長雨(ながあめ)と日照(ひで)りが、代わる代わる田を打った。京の門前(もんぜん)に、痩(や)せた顔が、一つ、二つと増えはじめていた。',
  '貴なる膳を切るきくの手は、その顔を、まだ見ないふりをしていた。',
]},
{t:'鴨川(かもがわ)の、飢饉', p:[
  '飢饉(ききん)は、京を呑(の)んだ。',
  '寛正(かんしょう)の、大飢饉。田を捨てた百姓(ひゃくしょう)が食を求めて京へ流れ込み、そして京で、行き倒(だお)れた。鴨川(かもがわ)の河原(かわら)は、幾万(いくまん)の亡骸(なきがら)で埋まった。数えた僧が、二月(ふたつき)で八万を超えて、数えるのをやめた、という。',
  'きくは、庖丁を置いた。鯉を捌く手で糠(ぬか)を練り、草の根を煮た。願阿弥(がんあみ)という僧が開いた施粥(せがゆ)の場で、朝から晩まで、薄い粥を鼎で炊いた。切り口の美しさなど、誰も見なかった。',
  '同じ京の内で、将軍(しょうぐん)・足利義政(あしかがよしまさ)は、庭を造り、宴(うたげ)を張っていた。河原の死者と、御所(ごしょ)の酒宴(しゅえん)が、同じ空の下にあった。',
  'このとき、きくは、師の言葉の残り半分を知った。包丁は、切るためではない。活(い)かすためだ。――貴なる切り口ではなく、薄い粥の一杯が、人を活かす。',
  '師の宗心は、その飢饉の冬に、痩せて死んだ。庖丁式の奥義(おうぎ)を、半分、伝えきらぬまま。',
]},
{t:'上(かみ)の、いくさ', p:[
  '飢饉の傷(きず)も癒(い)えぬうちに、今度はいくさが来た。',
  '将軍の跡目(あとめ)を、誰が継ぐか。それに、大名(だいみょう)の家督(かとく)争いが絡(から)んだ。細川(ほそかわ)と、山名(やまな)。京は、東(ひがし)の軍と西(にし)の軍に、真っ二つに割れた。',
  '「上(かみ)の争いだ」と、町の者は吐き捨てた。「わしらには、名も、理由(わけ)もわからぬ」。誰が勝てば飯が増えるのか。誰も、答えられなかった。',
  'これまでのいくさは、遠い野(の)で行われた。此度(こたび)は、違った。京のただ中で、武者(むしゃ)が斬(き)り合った。町がそのまま、戦場(いくさば)になった。',
  'きくは鼎を抱(かか)えて思った。――飢饉は、天(てん)の仕業(しわざ)。だが、これは、人の仕業だ。',
]},
{t:'京(みやこ)が、燃える', p:[
  '京は、燃えた。',
  '一度ではない。十年(ととせ)、そのまた十年と、焼けては、また焼けた。火をつけて回るのは、足軽(あしがる)だった。',
  '足軽――銭(ぜに)で雇(やと)われた、素(す)っ町人、素っ百姓の兵。武家(ぶけ)の家柄(いえがら)など、ない。彼らは焼け跡から金目(かねめ)の物を奪(うば)った。身分の低い者が刀を持ち、上を脅(おびや)かす。世が、根(ね)っこから、ひっくり返ろうとしていた。',
  '火が、きくの町にも迫(せま)ってきた。風にあおられた炎(ほのお)が、隣の、そのまた隣の家を舐(な)めていく。',
  'きくは鼎を運び出そうとした。だが、人が二人がかりの鉄の釜は、火の速さには、とても追いつかなかった。',
  '抱えて逃げれば、共に焼ける。置いて逃げれば、失(うしな)う。きくは、一族千五百年の釜を前に、選ばねばならなかった。',
]},
{t:'釜を、埋める', p:[
  'きくは、埋めることにした。',
  '崩(くず)れかけた土蔵(どぞう)の床(ゆか)を掘り、鼎をそこへ沈めた。土を被(かぶ)せ、瓦(かわら)を積み、忘れぬよう、焼け残りそうな石地蔵(いしじぞう)の真裏(まうら)と覚えた。',
  '抱えて逃げたのは、庖丁一本と、身ひとつ。魚を活かす真魚箸(まなばし)と、飢えを凌(しの)ぐ包丁だけを、懐(ふところ)に。',
  '振り返ると、埋めた蔵ごと、町が炎に呑まれていくところだった。土の下の釜が、その熱にどれほど灼(や)かれているか――きくには、知りようもなかった。',
  '逃げる列の中に、若い弟子(でし)の新蔵(しんぞう)がいた。「師匠(ししょう)、釜は」と新蔵が問うた。「土に、預けた」ときくは言った。「土は、焼けても、燃え尽きはしない」。',
  '京を出る峠(とうげ)で、きくは一度だけ、燃える都を振り返った。千年の京が、赤い一塊(ひとかたまり)になっていた。',
]},
{t:'掘り、出す', p:[
  '戦(いくさ)が西(にし)へ移った隙(すき)に、きくは京へ戻った。',
  '焦土(しょうど)だった。町の形(かたち)は、消えていた。どこに何があったか、灰の上からはもうわからない。ただ、焼け残った石地蔵だけが、傾(かたむ)いて立っていた。',
  'その真裏を、きくは素手(すで)で掘った。爪(つめ)が割れ、指が焼け跡の熱で爛(ただ)れても、掘った。',
  '土の底から、鉄の丸みが現れた。鼎だった。',
  '火に舐(な)められ、黒く煤(すす)け、片側がわずかに歪(ゆが)んでいた。六つ目の疵だった。だが――割れては、いなかった。三本の脚で、土の底に、どっしりと立っていた。',
  '土は、焼けても、燃え尽きはしない。師の言葉ではなかったが、きくは、そう思った。',
  '一族の釜は、京もろとも焼かれて、なお、飯を炊く形を、失っていなかった。',
]},
{t:'西(にし)へ、運ぶ', p:[
  '京は、死んだ。',
  '応仁の乱は、勝者(しょうしゃ)を生まなかった。十一年、焼き合って、誰も勝たず、ただ京が灰になっただけだった。将軍の威(い)は地(ち)に墜(お)ち、天下は、力ある者が銘々(めいめい)に切り取る、下剋上(げこくじょう)の世へ、雪崩(なだ)れていった。',
  '焼け出された公家(くげ)も、連歌師(れんがし)も、庖丁人(ほうちょうにん)も、京を捨て、地方(ちほう)の大名(だいみょう)を頼(たよ)った。京の雅(みやび)を欲(ほ)しがる大名は、多かった。都の文化が、荷(に)に負(お)われて、諸国(しょこく)へ散っていった。',
  'きくも、掘り出した鼎を背負い、真魚箸を懐に、新蔵を連れて、西の、とある山城(やまじろ)の城下(じょうか)へ下(くだ)った。城主(じょうしゅ)は、京の四条流を、ことのほか喜んだ。',
  '歪んだ六つ疵の鼎が、京から遠く離れた地方の城の竈(かまど)に据えられた。京では貴人の膳を炊いた釜が、いまは、武者の腹を炊く。',
  'やがて、こうした山城のひとつひとつが、天下を賭(か)けて喰(く)い合う。城が建ち、城が落ちる、戦国(せんごく)の世が始まろうとしていた。この釜も、いつか、落ちる城の火を、また見ることになる。',
  'だが今日は、まだ平(たい)らかだ。きくは真魚箸で、城主の膳の鯉(こい)を、手を触れずに捌(さば)いた。京仕込みの切り口が、遠い山国(やまぐに)の膳に、ひとつ、光った。',
]},
/* ─ 第七世 戦国・鳥取渇え殺し 38-46 ─ */
{t:'米(こめ)を、売る', p:[
  '弥一(やいち)の一日は、匂いで始まる。',
  '暗いうちに台所へ立つと、昨夜(ゆうべ)の残り火に、味噌の焦げた匂いが薄く残っている。灰を掻(か)き、薪(まき)をくべ、水を汲(く)む。因幡(いなば)の水は、山の水だ。舌にのせると、奥のほうが、ほんのり甘い。弥一は、この甘さで飯を炊くのが、たまらなく好きだった。',
  '頭(かしら)の茂平(もへい)は、この鳥取(とっとり)の城の台所を、四十年預かってきた。右手の指が二本、包丁で潰(つぶ)れて短い。その潰れた指で握る飯が、弥一は、世界でいちばん旨(うま)いと思っている。',
  '飯を炊くのは、三本脚の古い鉄の釜――〈鼎(かなえ)〉。六つの疵(きず)がある。昔、京(みやこ)が焼けた乱の頃、一族の女(おんな)が地方(ちほう)の山城へ持ち下(くだ)ったものだと、茂平は言った。以来この釜は、城から城へ、料理人とともに渡ってきた。',
  'その朝、城下で、おかしなことが起きていた。米屋(こめや)の前に、見慣れぬ上方(かみがた)言葉の商人が立ち、因幡じゅうの米を、相場(そうば)の倍(ばい)の値(ね)で買い集めていた。城の兵糧(ひょうろう)を握る重臣(じゅうしん)、中村(なかむら)と森下(もりした)が、蔵(くら)の米を、その商人に売り払ったという。',
  '茂平の手が、止まった。「弥一。倍の値で、他所(よそ)の者が米を欲しがる。その理由(わけ)を、考えたことがあるか。……先に、腹を、抜きにきとる。あれは、たぶん、羽柴(はしば)よ」',
  'その夜、井戸端(いどばた)で、弥一は、さよを見た。米屋の末娘(すえむすめ)で、家の米が高く売れたと、少し得意げだった。桶(おけ)を持ち上げそこねてこぼした水が、篝火(かがりび)に散った。「あ」とさよが笑う。「もったいない」と弥一は言った。水一杯を、本気で惜(お)しむ男だった。',
  'さよは、変な人、という顔で笑った。――その水を、半年後、二人がどんな思いで見ることになるか、まだ誰も知らない。',
]},
{t:'白装束(しろしょうぞく)', p:[
  'その夜、城に、新しい将(しょう)が入った。',
  '石見(いわみ)から遠く呼ばれてきた、吉川経家(きっかわつねいえ)。三十を少し過ぎたばかりの、静かな目をした武将だった。',
  '経家は城に入るとき、鎧(よろい)の下に白い装束(しょうぞく)を巻いていた、と門番が囁(ささや)いた。死装束(しにしょうぞく)だ。この城が、いくさの前から負けを覚悟(かくご)せねばならぬ城だと、経家は、わかって来たのだ。',
  '城の侍(さむらい)たちは、勇(いさ)んでいた。中村も森下も、「羽柴なにするものぞ」と胸を張った。米を売った、その口で。',
  '弥一は一度、経家に膳(ぜん)を運んだ。経家は椀(わん)の飯を、ひと粒(つぶ)も残さず食い、こう言った。「旨い。……この米を、大切にせよ。米は、いくさの、命綱(いのちづな)だ」',
  'その米が、もう蔵にいくらも残っていないことを、経家は、着いたばかりで、まだ知らなかった。',
]},
{t:'囲(かこ)まれる', p:[
  '夏の初め、山の向こうが、揺(ゆ)れはじめた。',
  '羽柴の軍。二万とも、それ以上とも言われた。彼らは城を攻めなかった。攻める代わりに、城を囲む山という山に、自分たちの砦(とりで)を築(きず)きはじめた。',
  '付城(つけじろ)、という。柵(さく)を結(ゆ)い、堀(ほり)を掘(ほ)り、蟻(あり)一匹通さぬ輪(わ)で、鳥取城を、ぐるりと閉じた。',
  '戦(いくさ)なら、弥一にもわかる。斬(き)り、突(つ)き、勝ち負けが、その日に決まる。だが、これは戦ではなかった。これは、待(ま)つ、いくさだった。',
  '城の蔵は、空(から)に近かった。米は、あの倍の値で、すでに売られていた。',
  '羽柴は、刀を一度も抜かずに、この城を殺(ころ)しにかかっていた。',
]},
{t:'門(もん)を、開ける', p:[
  '羽柴は、狡(こす)い手を打った。',
  '城の周りの村々を焼き、行き場を失った百姓(ひゃくしょう)を、わざと城の門へと追い立てたのだ。口を増やして、早く飢えさせるために。',
  '「入れてくれ」「助けてくれ」。門の外に、女子供(おんなこども)があふれた。',
  '経家はしばらく門を見つめ、静かに言った。「開けよ」。中村が血相(けっそう)を変えた。「なりませぬ! ただでさえ兵糧が乏(とぼ)しいのに、口が増えれば、皆で早く飢えまするぞ!」。経家は動じなかった。「その口を増やしたのは、誰だ、中村。倍の値に目が眩(くら)んで、城の米を売ったのは、誰だ」',
  '弥一は、台所の隅(すみ)で、それを聞いていた。米を売って肥(こ)えた者と、それでも民を見捨てられぬ将と。どちらが正しいか、弥一にはわからなかった。ただ、口が増えれば、自分の炊く飯が、それだけ薄くなることだけは、わかった。',
  '門が、開いた。数千の民が、なだれ込んだ。',
  'その日から、弥一の、もうひとつのいくさが始まった。一粒(ひとつぶ)の米を、十粒(とつぶ)に見せる、いくさが。',
]},
{t:'一粒(ひとつぶ)を、十粒(とつぶ)に', p:[
  '粥(かゆ)を、水で伸(の)ばし、また伸ばす。',
  '米が尽(つ)きれば、稗(ひえ)、粟(あわ)、豆。それも尽きれば、馬(うま)の飼(か)い葉(ば)に手をつけた。茂平は、潰れた指で、どんな屑(くず)からでも、汁(しる)の一杯をひねり出した。',
  '「弥一。料理人ってのはな」と、茂平は痩(や)せた頬(ほお)で笑った。「飯がある時にゃ、誰でもできる。何もない時に、それでも人を生かす。それが、俺たちの、いくさよ」',
  '――どこの代の、誰が言い出した言葉なのか。ただ、包丁人のあいだに、ずっと言い伝えられてきた言葉だった。ずっと昔、博多(はかた)の浜で、飢えた御家人(ごけにん)に味噌玉(みそだま)を配った、名もなき賄い方(まかないかた)から。',
  'さよも、城にいた。米屋は焼かれ、家族は門の内へ逃げ込んでいた。得意げに米を売った家の娘が、いま、その米が一粒もない城の中で、水を配っていた。弥一は、隠していた握り飯を半分、さよの手に押し込んだ。誰にも見られぬように。この城で、いちばん高価(こうか)なものだった。',
  'さよは、それを見て、泣きそうな顔で笑った。「……水を、こぼした時と、同じ顔してる」',
]},
{t:'馬(うま)を、食う', p:[
  '秋が来て、城は、地獄になった。',
  '馬は、とうに一頭も残っていない。草はすべて食い尽くされ、木の皮が剝(は)がされ、藁(わら)まで煮て啜(すす)った。',
  '人は痩せると、まず立てなくなり、次に、目だけが異様に大きくなる。城の内は、大きな目をした者ばかりになった。',
  '弥一の炊く「飯」は、もう飯ではなかった。土のような、藁のような、名のつかぬ何かを、湯で溶(と)いたものだった。それでも人々は、その一杯のために、朝から竈(かまど)の前に並び、並んだまま、動かなくなる者がいた。',
  '鼎の底を、弥一は毎日、掻(か)き削(けず)った。こびりついた一粒、焦(こ)げの一片(いっぺん)も捨てぬために。二百日、掻きつづけて、鉄の底が、薄く窪(くぼ)んだ。七つ目の疵(きず)だった。飢えが、鉄そのものを削(けず)った疵だった。',
  'それでも、腹の足しには、ならなかった。',
]},
{t:'喰(く)うな', p:[
  '生きている者が、生きるために、してはならぬことに手を伸ばしはじめていた。',
  '城の隅で、それは、静かに始まっていた。この物語は、それを詳しくは書かない。',
  '茂平が、弥一を竈の裏へ呼んだ。震える弥一の肩を、潰れた二本指で掴(つか)んだ。「弥一。よく聞け。お前は、あれを、喰うな。何があっても、喰うな」',
  '「料理人は、最後まで、人が喰える物だけを、人に出す者だ。それを忘れたら、お前はもう料理人じゃない。ただの、獣(けもの)だ」',
  '茂平はその夜、自分の粥を、弥一とさよに分け、翌朝、動かなくなっていた。潰れた指を、胸の上で組んで。',
  '弥一に遺(のこ)されたのは、血の一滴でも、田の一枚でもなく――「人が喰える物だけを出せ」という、たった一つの掟(おきて)だった。',
  '弥一は、その掟を、痩せた胸に抱(だ)いた。それだけが、この地獄で、弥一を、獣にしなかった。',
]},
{t:'経家(つねいえ)、腹を切る', p:[
  '城将(じょうしょう)・経家は、櫓(やぐら)から、餓(う)えた城内を、毎日、見ていた。',
  'そして、決めた。羽柴の陣へ、使者(ししゃ)を送った。――城兵(じょうへい)と民の命を、すべて助けよ。代わりに、この経家の首、一つで、城を開く、と。',
  '羽柴筑前(ちくぜん)は、この降伏(こうふく)を受けた。そして、敵将(てきしょう)ながら、経家の覚悟(かくご)に、深く頭(こうべ)を垂れた、という。',
  '経家は、城に入るとき巻いてきた白装束を、ついに表に出した。城に入る前から、この日のために用意していた装束だった。故郷(くに)の子へ、こう書き遺(のこ)した。――武士(もののふ)の名利(みょうり)は、討ち死にか、腹を切るか、二つのほかに、なし。',
  '経家が腹を切り、鳥取城の門が、開かれた。',
  '弥一は、その門から、羽柴の兵が運び込む、白い湯気(ゆげ)を見た。粥(かゆ)だった。',
]},
{t:'白い、粥(かゆ)', p:[
  '羽柴の陣から、粥が運び込まれた。白い、本物の、米の粥だった。',
  '飢えた者たちは、我(われ)を忘れて、それを喉(のど)に流し込んだ。そして、その多くが、死んだ。',
  '長く渇(かつ)えた腹は、急な飯を受けつけない。喜びのあまり掻き込んだ一杯が、彼らの命を奪った。助かった、と泣きながら、人々は、白い粥を頬張(ほおば)ったまま、次々と倒れていった。',
  '弥一は、さよの手を必死に押さえた。「喰うな! ゆっくりだ! ひと匙(さじ)ずつだ! ――頼(たの)む、さよ、ゆっくり喰ってくれ!」',
  '料理人の子は、知っていた。飯が、人を生かすことも。飯が、人を、殺すことも。',
  'さよは、震える手で、ひと匙ずつ、それを口に運んだ。生きた。二人は、生きた。',
  'だが、落城(らくじょう)した城の料理人に、平穏(へいおん)はなかった。米を売った中村・森下は、この期(ご)に及んでなお生き延びる算段(さんだん)をし、その巻(ま)き添(ぞ)えは、いつも名もなき者に降りかかる。弥一は、さよの手を取って、城を抜けた。',
  'その翌年(よくとし)、天(てん)が、また、ひっくり返る。羽柴の主(あるじ)・織田信長(おだのぶなが)が、京の本能寺(ほんのうじ)で、家臣(かしん)に討たれた。羽柴は、中国から恐ろしい速さで駆(か)け戻り、天下を掴(つか)みにいく。城ひとつの飢えの上を、天下の主が、一夜で、すげ替(か)わっていく。',
  '弥一は、渇えが削った七つ目の疵の鼎を背負った。茂平の掟を胸に。さよの手を、片手に。「行くぞ。俺は、まだ、旨(うま)い物を、作ってない」。飢えを喰らい抜いた少年は、まだ、包丁を捨てていなかった。',
]},
/* ─ 江戸 47-54 ─ */
{t:'戦の音が、絶えて久しい', p:['戦(いくさ)の音が、絶えて、久しい。','さとが生まれてこのかた、田畑を焼く軍も、逃げ惑う夜も、なかった。','祖母は「ありがたいことだ」と、何度も言った。']},
{t:'焼けぬ、夜', p:['祖母の、そのまた祖母の頃は、まだ、村が焼けた話が、残っていたという。','いまは、焼けない。','その一事が、どれほどのものか、さとは、まだ知らなかった。']},
{t:'大名(だいみょう)行列', p:['大名の行列が通る日は、みな道の端に、平伏(ひれふ)した。','槍(やり)と、長持(ながもち)と、絹の羽織が、金の音を立てて過ぎていく。','その大名の名を、さとは知らない。']},
{t:'顔を、上げてはならぬ', p:['「顔を、上げてはならぬ」と、母は小声で言った。','さとは、地面を見つめていた。土と、草履(ぞうり)の裏と、自分の膝を。','身分(みぶん)、という見えない線が、道の上に、引かれていた。']},
{t:'妹の手を、そっと', p:['平伏したまま、さとは、隣の幼い妹の手を、そっと握った。','誰にも、見えぬように。','行列がどれほど偉かろうと、この手の熱さは、行列のものでは、なかった。']},
{t:'長屋の、灯り', p:['夜、長屋の灯りの下で、母は繕(つくろ)いをし、父は湯屋(ゆや)の話をした。','妹は、膝で眠っていた。','名もない、けれど、焼けない夜だった。']},
{t:'湯屋の、話', p:['父は、湯屋で聞いた話を、面白おかしく語った。','瓦版(かわらばん)の噂、相撲(すもう)の勝ち負け、隣町の火事。','天下の大事は、そのどれにも、まぎれていた。']},
{t:'この温かさのために', p:['握った妹の手は、恐れではなく、ただ、温かかった。','この温かさのために、幾百年、手は握られてきたのかもしれない。','さとは、まだそれを知らずに、眠った。']},
/* ─ 明治 55-62 ─ */
{t:'汽車が、煙を吐く', p:['汽車が、煙を吐いて、走っていた。','鉄の道が、国じゅうに、敷かれていく。','ちよは、その汽車に、乗せられた。']},
{t:'遠い町へ、売られる', p:['糸を繰(く)る工女(こうじょ)、と呼ばれた。','遠い町の工場(こうば)へ、年季(ねんき)で売られたのだ。','年季が明けるまで、村へは、帰れない。']},
{t:'お国のため、家のため', p:['「お国のため、家(いえ)のためだ」と、村を出る朝、父は言った。','文明開化(ぶんめいかいか)、富国強兵(ふこくきょうへい)。偉い人々は、そう説いた。','ちよには、その言葉の意味が、わからなかった。']},
{t:'糸を、繰る', p:['朝は暗いうちに起き、夜は星が出てから、床(とこ)についた。','指は、熱い湯と、細い糸で、白くふやけ、ときに、切れた。','繰った糸は、やがて海を渡り、この国を、豊かにするのだという。']},
{t:'眠れぬ、夜', p:['眠れぬ夜、ちよは、村の母を思った。','母の手も、こんなふうに、荒れていた。','同じ手が、いま、遠く離れて、同じように、荒れている。']},
{t:'電信柱が、飛ぶ', p:['窓の外を、初めて見る電信柱(でんしんばしら)が、飛ぶように、過ぎていく。','国は、坂の上の雲を目指して、急いでいた。','その速さに、ちよは、ただ、揺られていた。']},
{t:'同い年の、手', p:['隣で、同い年の工女が、泣いていた。','ちよは、その手を、そっと握った。荒れて、糸で切れた、自分の手で。','握った手は、温かかった。それが、遠い村の、母の手に、似ていた。']},
{t:'坂の、どこにも', p:['国は、豊かになっていった。','汽車は増え、工場は建ち、糸は、海を渡った。','その坂の、どこにも、ちよの名は刻まれない。ただ、糸だけが、残った。']},
/* ─ 大正 63-69 ─ */
{t:'明るい世だ、と町は言った', p:['新しい世だ、と町は言っていた。','女(おんな)も学びはじめ、髪を結いなおし、通りを歩いた。','はるは、その明るさの中で、大人になった。']},
{t:'電灯と、活動写真', p:['電灯が灯り、夜が、明るくなった。','活動写真(かつどうしゃしん)の中で、人が動き、笑い、泣いた。','はるは、その光を、まぶしいと思った。']},
{t:'昼どき、地が割れる', p:['昼どき、火を使う刻(とき)だった。','大地が、うねった。','家々が、傾き、崩れた。大正(たいしょう)の、あの大きな地震(なゐ)だった。']},
{t:'火が、出た', p:['そして、火が、出た。','あちこちの竈(かまど)から立った火が、風にあおられ、町を舐(な)めていく。','明るい町が、一日で、灰になろうとしていた。']},
{t:'逃げ惑う、波', p:['はるは、逃げ惑う人の波の中に、いた。','荷を負う者、子を抱く者、名を呼び合う声。','その声の多くは、二度と、答えを得なかった。']},
{t:'両の手が、ふさがる', p:['火の粉のなかを、はるは、はぐれかけた幼い子の手を、力いっぱい握って走った。','もう片方の手は、老いた父を、引いていた。','両の手が、ふさがっていた。それでも、離さなかった。']},
{t:'掌に、二つの熱', p:['幾万の名が、その日、失われた。多くは、名簿にも、残らなかった。','生き延びて焼け跡に立ったとき、はるの両の掌には、握りしめた二つの手の熱が、まだ、残っていた。','<b>その熱だけが、はるに、生きていることを教えた。</b>']},
/* ─ 昭和 70-78 ─ */
{t:'南の島の、名', p:['新聞が、遠い南の島の名を、報じていた。','聞いたこともない島で、この国の男たちが、戦っているのだという。','すゑの夫も、そのひとりだった。']},
{t:'大本営は、勝利を告げる', p:['大本営(だいほんえい)は、勝利を、告げ続けた。','だが、町からは、男が、ひとり、またひとりと、消えていった。','勝っているはずの戦(いくさ)で、なぜ、と、誰も口には出さなかった。']},
{t:'警報', p:['警報が、鳴った。','走る足。閉じる雨戸。消される灯り。','すゑは、四つになる娘の手を握って、防空壕(ぼうくうごう)へ、走った。']},
{t:'防空壕の、暗がり', p:['防空壕の暗がりで、すゑは、娘の手を握りしめていた。','頭の上を、地の底を、音が、通り過ぎていく。','すゑの世界は、この暗がりと、この小さな手の熱さが、すべてだった。']},
{t:'娘は、泣かなかった', p:['娘は、泣かなかった。','ただ、母の手を、握り返していた。','新聞の伝える勝利も、南の島の名も、この暗がりには、届かなかった。']},
{t:'空が、燃える', p:['外へ出ると、空が、燃えていた。','街が、赤かった。','焼夷弾(しょういだん)というものが、天から、降ったのだという。']},
{t:'朝が、来た', p:['朝が来て、二人は、まだ生きていた。','焼け跡の匂いのなか、瓦礫(がれき)の間に、見知った顔が、いくつも、なかった。','すゑは、娘の手を、握りなおした。']},

{t:'離さなかった年月', p:['国の歴史が、この時代を、どんな名で呼ぶのだとしても。','すゑにとってそれは、「あの子の手を、離さなかった年月」だった。','<b>勝敗も、大義も、すゑの掌の外にあった。掌の中には、ただ、娘の手が、あった。</b>']},
/* ─ 平成 79-84 ─ */
{t:'時代の名が、変わる', p:['テレビの中で、時代の名が、変わった。','「平成(へいせい)」と、白い額(がく)が掲げられた朝を、まさ子は、団地(だんち)の茶の間で見ていた。','隣には、年老いた母がいた。あの、防空壕で手を握られた、娘だった。']},
{t:'豊かに、なったという', p:['国は、豊かになった、という。','車があり、テレビがあり、誰も、飢えない。','かつて村を焼き、夫を、子を奪った同じ国が、いまは静かに、平らだった。']},
{t:'泡(あわ)が、消えた', p:['やがて、好景気(こうけいき)は、泡のように、消えた。','土地の値も、株の値も、崩れていく、と新聞は書いた。','まさ子には、その数字は、遠かった。']},
{t:'傾く、会社', p:['まさ子の夫の会社も、傾いた。','それでも、飢えはしなかった。焼けも、しなかった。','その二つがどれほどのことか、まさ子は、母の顔を見るたびに、思った。']},
{t:'母の、小さな手', p:['母が、床(とこ)についた。','しわだらけの、小さな手だった。','まさ子は、その手を、握った。']},
{t:'握り返した', p:['母は最期に、握り返した。','何も言わず、ただ、握り返した。','その握り方に、まさ子は、覚えがあった。幼い日、自分が握られた、あの握り方だった。<b>千五百年そうして握られてきたのだと――まさ子は、まだ、知らない。</b>']},
/* ─ 令和 85-90 ─ */
{t:'街の灯が、流れる', p:['電車が、揺れている。','夕方の車内。窓の外を、街の灯りが、流れていく。','あなたは、隣で船を漕ぐ子どもの、小さな手を、握っている。']},
{t:'手のひらの、板', p:['手のひらの中には、光る板(いた)がある。','その中に、世界じゅうの言葉が、絶えず流れ込んでくる。','けれど、いま、あなたが握っているのは、板ではない。この子の、手だ。']},
{t:'名は、ひとつも残らない', p:['古墳を積んだ手も、都の泥をついた手も、戦火の暗がりで握られた手も。','名は、ひとつも、残っていない。','歴史の本に、彼らの頁(ページ)は、ない。']},
{t:'けれど、熱は地続き', p:['けれど、いま、あなたの掌のなかで眠る、この子の手の熱さは。','たしかに、あの日の、ひなの手の熱さと、地続きだ。','千五百年、途切れずに。']},
{t:'握られ続けた手が', p:['千五百年、握られ続けた手が、いま、この子を握っている。','名を残した者たちの物語は、本の中に、ある。','この、名を残さなかった者たちの物語は――<b>あなたの掌の中に、ある。</b>']},
{t:'やがて、この子も', p:['やがてこの子も、誰かの手を握るだろう。','名も残さず。','けれど、たしかに――温かく。','これで、九十日の物語は、了(お)わる。握った手を、離さぬままに。']},
];

/* ============ ルビ：漢字(かな) → <ruby> ============ */
function rubi(s){
  return s.replace(/([一-鿿々]+)\(([ぁ-ゖー\s]+)\)/g,
    '<ruby>$1<rt>$2</rt></ruby>');
}

/* ============ 漢数字 ============ */
function kan(n){
  const d=['','一','二','三','四','五','六','七','八','九'];
  if(n<10) return d[n];
  if(n<20) return '十'+d[n-10];
  const t=Math.floor(n/10), o=n%10;
  return d[t]+'十'+d[o];
}

/* ============ 状態（保存） ============ */
const KEY='tenohira.v1';
let ST={ fam:'', start:0, read:[], peek:0 };
function load(){ try{ const s=JSON.parse(localStorage.getItem(KEY)); if(s) ST=Object.assign(ST,s);}catch(e){} }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(ST)); }catch(e){} }
function midnight(ms){ const d=new Date(ms); d.setHours(0,0,0,0); return d.getTime(); }
// 解禁日数：最初の三日は一気読み可。以後は開始日から1日1話。peek（先読み）で先へ進める。
function unlocked(){
  const days=Math.floor((midnight(Date.now())-midnight(ST.start))/DAY_MS)+1;
  return Math.max(1, Math.min(90, Math.max(days, 3, 1+ST.peek)));
}
function isRead(d){ return ST.read.includes(d); }
function markRead(d){ if(!isRead(d)){ ST.read.push(d); save(); } }
// ホームで開くべき「今日の一話」：解禁済みで未読の最初の日、なければ最新解禁日
function todayDay(){
  const u=unlocked();
  for(let d=1; d<=u; d++) if(!isRead(d)) return d;
  return u;
}

/* ============ 画面遷移 ============ */
const SCR=['cover','home','reader','toc','jo'];
function show(id){ SCR.forEach(s=>$('#'+s).classList.toggle('show', s===id)); }
function setAc(d){ const e=eraOf(d); if(e) document.documentElement.style.setProperty('--ac', e.ac); }

/* ============ ホーム描画 ============ */
function renderHome(){
  const d=todayDay(), e=eraOf(d);
  setAc(d);
  $('#dedic').innerHTML = '――釜ひとつを継いだ、一族の記録。';
  const done = ST.read.length>=90;
  if(done){
    $('#todayN').innerHTML=''; $('#todayEra').textContent=''; $('#todayTtl').textContent='';
    $('#todayTease').innerHTML='<span class="allread">九十日を、読み終えました。<br>釜の火は、まだ、消えていません。</span>';
    $('#openToday').textContent='もう一度、はじめから';
  }else{
    $('#todayN').innerHTML = `第<span class="ji">${kan(d)}</span>日`;
    $('#todayEra').textContent = e.name+' ・ '+e.who;
    $('#todayTtl').innerHTML = rubi(DAYS[d-1].t);
    $('#todayTease').textContent = DAYS[d-1].p[0].replace(/\(.*?\)/g,'');
    $('#openToday').textContent = isRead(d)? 'もう一度、よむ' : 'よ　む';
  }
  const n=ST.read.length;
  $('#progTxt').textContent=`${n} / 90`;
  $('#progFill').style.width=(n/90*100)+'%';
  $('#progPct').textContent=Math.round(n/90*100)+'%';
}

/* ============ 読書（頁めくり） ============ */
let R={ day:1, page:0, pages:1 };
function openDay(d){
  if(d<1||d>90) return;
  if(d>unlocked()) return;
  R.day=d; R.page=0; setAc(d);
  const e=eraOf(d);
  $('#rEra').textContent = `第${kan(d)}日　${e.short}`;
  const reel=$('#reel'); reel.innerHTML='';
  reel.style.transition='none'; reel.style.transform='translateX(0)';
  const idx=ERAS.indexOf(e);
  if(d===e.from && idx>0){                       // 世代の変わり目＝世代扉（幾代かのち／釜の疵）
    const g=el('div','gten');
    g.appendChild(el('div','gk','― 幾代か、のち ―'));
    g.appendChild(el('div','gn', `第 ${kan(idx+1)} 世`));
    g.appendChild(el('div','ge', rubi(`${e.name}　${e.ev||''}`)));
    g.appendChild(el('div','gs', `この釜、${kan(idx)}つの疵(きず)を負う`));
    reel.appendChild(g);
  }
  const tob=el('div','etobira');
  tob.appendChild(el('div','no', `第 ${kan(d)} 日`));
  tob.appendChild(el('div','ttl', rubi(DAYS[d-1].t)));
  tob.appendChild(el('div','who', e.who));
  reel.appendChild(tob);
  const body=el('div','ebody');
  DAYS[d-1].p.forEach(par=>body.appendChild(el('p',null,rubi(par))));
  reel.appendChild(body);
  $('#done').classList.remove('show');
  $('#rhint').style.display='';
  show('reader');
  reel.offsetWidth;   // 同期リフロー（背景タブでもrAFに頼らず確実に組む）
  layout();
  requestAnimationFrame(()=>{ reel.style.transition=''; });
}
function layout(){
  const stage=$('#stage'), reel=$('#reel');
  const cs=getComputedStyle(reel);
  const pitch=parseFloat(cs.lineHeight);                       // 行送り(px)
  const PAD=34, sw=stage.clientWidth;
  R.step=Math.max(pitch, Math.floor((sw-PAD*2)/pitch)*pitch);  // 頁送り＝行の整数倍
  $('#stage .pmask.l').style.width=(sw-PAD-R.step)+'px';       // 余りは左マスクへ＝見える幅も行の整数倍
  $('#stage .pmask.r').style.width=PAD+'px';
  reel.style.paddingLeft='34px';
  // 扉の送り幅を行送りの倍数に吸着（頁境界で行が割れないように）
  const tob=reel.querySelector('.etobira');
  if(tob){
    tob.style.marginLeft='10px';
    const w=tob.getBoundingClientRect().width+10;
    const extra=(pitch-(w%pitch))%pitch;
    tob.style.marginLeft=(10+extra)+'px';
  }
  reel.offsetWidth;                                            // 反映
  const padL=parseFloat(getComputedStyle(reel).paddingLeft);
  const tw=reel.scrollWidth-padL-PAD;
  R.pages=Math.max(1, Math.ceil(tw/R.step));
  if(R.page>R.pages-1) R.page=R.pages-1;
  applyPage(false);
  renderDots();
}
function applyPage(anim){
  const reel=$('#reel');
  const x=R.page*(R.step||$('#stage').clientWidth);
  reel.style.transition = anim?'':'none';
  reel.style.transform=`translateX(${x}px)`;
  if(!anim) requestAnimationFrame(()=>reel.style.transition='');
}
function renderDots(){
  const dd=$('#rdots'); dd.innerHTML='';
  if(R.pages<2) return;
  for(let i=0;i<R.pages;i++){ const s=el('i'); if(i===R.page) s.className='on'; dd.appendChild(s); }
}
function next(){
  $('#rhint').style.display='none';
  if(R.page < R.pages-1){ R.page++; applyPage(true); renderDots(); }
  else { finishDay(); }
}
function prev(){
  $('#rhint').style.display='none';
  if($('#done').classList.contains('show')){ $('#done').classList.remove('show'); return; }
  if(R.page>0){ R.page--; applyPage(true); renderDots(); }
}
function finishDay(){
  markRead(R.day);
  const d=R.day;
  $('#doneTtl').innerHTML = rubi(`第${kan(d)}日「${DAYS[d-1].t}」`);
  const e=eraOf(d);
  $('#doneDtl').textContent = `${e.name} ・ ${e.who}`;
  const nxt=$('#doneNxt'), acts=$('#doneActs');
  acts.innerHTML='';
  if(d>=90){
    nxt.innerHTML='<span class="lbl">奥付</span>鼎（かなえ） ―― 全九十日 ・ 了<br>釜の火を、絶やさぬままに。';
    const b=el('button','go','はじめへ　もどる'); b.onclick=()=>{ show('home'); renderHome(); };
    acts.appendChild(b);
  }else if(d+1<=unlocked()){
    const ne=eraOf(d+1);
    nxt.innerHTML=`<span class="lbl">次の一話</span>${rubi(`第${kan(d+1)}日「${DAYS[d].t}」`)}<br><span style="color:var(--sub)">${ne.name}</span>`;
    const b=el('button','go','▷　次の一話へ'); b.onclick=()=>openDay(d+1);
    acts.appendChild(b);
  }else{
    // 明日、解禁
    nxt.innerHTML=`<span class="lbl">明日の一話</span>${rubi(`第${kan(d+1)}日「${DAYS[d].t}」`)}<br><span class="lock">物語は、明日にとっておきましょう。</span>`;
    const pk=el('button','peek','▷　今日のうちに、先を読む'); pk.onclick=()=>{ ST.peek=Math.max(ST.peek, d); if(1+ST.peek<d+1)ST.peek=d; save(); openDay(d+1); };
    acts.appendChild(pk);
  }
  const sl=el('div','sub-links');
  const hb=el('button',null,'ホーム'); hb.onclick=()=>{ show('home'); renderHome(); };
  const tb=el('button',null,'目次'); tb.onclick=()=>{ renderToc(); show('toc'); };
  sl.appendChild(hb); sl.appendChild(tb); acts.appendChild(sl);
  $('#done').classList.add('show');
  renderHome();
}

/* ============ 目次 ============ */
function renderToc(){
  const u=unlocked(), cur=todayDay(), wrap=$('#tocInner'); wrap.innerHTML='';
  ERAS.forEach(e=>{
    const blk=el('div','era-block');
    const head=el('div','era-head');
    head.style.setProperty('--eac', e.ac);
    head.innerHTML=`<div class="er1"><span class="en">${e.name}</span><span class="ed">第${kan(e.from)}〜${kan(e.to)}日</span></div>`
      +`<div class="er2"><span class="ev2">${rubi(e.ev||'')}${e.yr?` ・ ${e.yr}`:''}</span><span class="ew">${e.who}</span></div>`;
    blk.appendChild(head);
    const cells=el('div','cells'); cells.style.setProperty('--eac', e.ac);
    cells.style.gridTemplateColumns=`repeat(${Math.min(6, e.to-e.from+1)}, 1fr)`;
    for(let d=e.from; d<=e.to; d++){
      const c=el('div','cell', kan(d));
      c.style.setProperty('--eac', e.ac);
      if(isRead(d)) c.classList.add('read');
      else if(d<=u) c.classList.add('open');
      else c.classList.add('lock');
      if(d===cur && !isRead(d)) c.classList.add('cur');
      if(d<=u) c.onclick=()=>openDay(d);
      cells.appendChild(c);
    }
    blk.appendChild(cells); wrap.appendChild(blk);
  });
}

/* ============ 序 ============ */
function renderJo(){
  const b=$('#joBody'); b.innerHTML='';
  JO.forEach(t=>b.appendChild(el('p',null,rubi(t))));
}

/* ============ イベント ============ */
$('#open').onclick=()=>{
  if(!ST.start) ST.start=Date.now();
  save(); renderHome(); show('home');
};
$('#toCover').onclick=()=>show('cover');
$('#openToday').onclick=()=>{ if(ST.read.length>=90){ ST.read=[]; ST.peek=0; save(); renderHome(); } openDay(todayDay()); };
$('#toToc').onclick=()=>{ renderToc(); show('toc'); };
$('#tocClose').onclick=()=>{ show('home'); renderHome(); };
$('#toJo').onclick=()=>{ renderJo(); show('jo'); };
$('#joClose').onclick=()=>openDay(todayDay());
$('#rClose').onclick=()=>{ renderToc(); show('toc'); };
$('#tapNext').onclick=next;
$('#tapPrev').onclick=prev;
document.addEventListener('keydown',e=>{
  if(!$('#reader').classList.contains('show')) return;
  if(e.key==='ArrowLeft'||e.key===' '){ e.preventDefault(); next(); }
  if(e.key==='ArrowRight'){ e.preventDefault(); prev(); }
});
window.addEventListener('resize',()=>{ if($('#reader').classList.contains('show')) layout(); });

/* ============ 起動 ============ */
load();
if(ST.start){ renderHome(); show('home'); }
else show('cover');
</script>
