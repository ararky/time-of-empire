<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>てのひらの、千五百年</title>
<style>
  :root{ --paper:#f2e9d6; --ink:#2a241c; --sub:#7a6f5a; --gold:#b08d3e; --indigo:#1a2740; }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; overflow:hidden;}
  body{font-family:"Hiragino Mincho ProN","Yu Mincho",YuMincho,serif; background:#0d0f14;
    -webkit-font-smoothing:antialiased; color:var(--ink);}

  /* ===== 表紙（藍・金） ===== */
  #cover{position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px 30px; text-align:center; color:#e9dfc4;
    background:
      radial-gradient(120% 80% at 50% 12%, rgba(176,141,62,.18), transparent 60%),
      linear-gradient(180deg,#1c2b48, #131d33 70%, #0f1728);}
  #cover .frame{border:1px solid rgba(176,141,62,.5); border-radius:2px; padding:44px 26px; max-width:340px; width:100%;
    box-shadow:0 0 60px rgba(0,0,0,.5) inset;}
  #cover .kicker{font-size:11px; letter-spacing:.5em; text-indent:.5em; color:var(--gold); margin-bottom:30px;}
  #cover h1{font-size:34px; font-weight:500; letter-spacing:.14em; line-height:1.5; color:#f2e6c8;
    text-shadow:0 2px 20px rgba(0,0,0,.5);}
  #cover .sub{font-size:12.5px; color:#c9bd9c; letter-spacing:.08em; line-height:1.9; margin-top:22px;}
  #cover .line{width:44px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:26px auto;}
  #cover .name-in{margin-top:6px;}
  #cover input{font-family:inherit; text-align:center; font-size:15px; color:#f2e6c8; background:rgba(255,255,255,.04);
    border:none; border-bottom:1px solid rgba(176,141,62,.5); padding:7px 6px; width:170px; letter-spacing:.1em;}
  #cover input::placeholder{color:#8a8069;} #cover input:focus{outline:none; border-color:var(--gold);}
  #cover .as{font-size:11px; color:var(--sub); margin-top:8px; letter-spacing:.1em;}
  #cover .open{margin-top:34px; font-family:inherit; cursor:pointer; border:1px solid rgba(176,141,62,.6);
    background:rgba(176,141,62,.12); color:#f2e6c8; font-size:15px; letter-spacing:.3em; text-indent:.3em;
    padding:13px 30px; border-radius:2px; transition:background .2s;}
  #cover .open:active{background:rgba(176,141,62,.25);}

  /* ===== 本文（縦書き・生成りの紙） ===== */
  #book{position:fixed; inset:0; z-index:5; display:none; background:var(--paper);
    background-image:radial-gradient(rgba(120,100,60,.05) 1px, transparent 1px); background-size:3px 3px;}
  #book.show{display:block;}
  #pages{position:absolute; inset:0; writing-mode:vertical-rl; -webkit-writing-mode:vertical-rl;
    overflow-x:auto; overflow-y:hidden; padding:48px 40px 44px; -webkit-overflow-scrolling:touch;
    font-size:22px; line-height:2.15; letter-spacing:.03em; color:var(--ink);}
  #pages::-webkit-scrollbar{display:none;}
  .ch{ display:inline-block; height:100%; }
  /* 扉（章の見出し） */
  .tobira{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; height:100%;
    padding:0 30px; margin-left:10px; border-left:1px solid rgba(120,100,60,.2);}
  .tobira .no{font-size:15px; letter-spacing:.4em; color:var(--gold); margin-right:22px;}
  .tobira .ttl{font-size:32px; letter-spacing:.24em; color:var(--ink); font-weight:500;}
  .tobira .who{font-size:16px; color:var(--sub); letter-spacing:.14em; margin-left:20px;}
  .body{display:inline-block; height:100%;}
  .body p{margin-right:1.3em; text-indent:1em;}
  .body p:first-child{text-indent:1em;}
  .body .b{font-weight:500;}
  .fin{display:inline-flex; align-items:center; justify-content:center; height:100%; padding:0 40px;
    color:var(--sub); font-size:14px; letter-spacing:.4em;}
  /* 序 */
  .jo{display:inline-block; height:100%;}
  .jo p{margin-right:1.4em; color:#4a4234;}
  .jo .h{font-size:15px; letter-spacing:.4em; color:var(--gold); margin-right:2em;}

  /* 走り（上部の細い時代表示）＋戻る */
  #head{position:fixed; top:0; left:0; right:0; z-index:6; display:none; justify-content:space-between; align-items:center;
    padding:12px 16px calc(10px); pointer-events:none;}
  #head.show{display:flex;}
  #era{font-size:11px; letter-spacing:.28em; color:var(--sub);}
  #back{pointer-events:auto; cursor:pointer; font-size:12px; color:var(--sub); letter-spacing:.1em; border:none; background:none; font-family:inherit;}
  .hint{position:fixed; bottom:16px; left:0; right:0; text-align:center; font-size:10.5px; letter-spacing:.2em; color:var(--sub);
    z-index:6; display:none; animation:bob 2.4s ease-in-out infinite; pointer-events:none;}
  .hint.show{display:block;} @keyframes bob{0%,100%{opacity:.4; transform:translateX(6px)}50%{opacity:.9; transform:translateX(-2px)}}
</style>
</head>
<body>

<!-- 表紙 -->
<div id="cover">
  <div class="frame">
    <div class="kicker">Ａ　ＮＯＶＥＬ</div>
    <h1>てのひらの、<br>千五百年</h1>
    <div class="sub">古墳のむらから、令和の街まで<br>――名もなき者たちの物語</div>
    <div class="line"></div>
    <div class="name-in">
      <input id="kamei" type="text" maxlength="8" placeholder="あなたの家名">
      <div class="as">――この一族の名を</div>
    </div>
    <button class="open" id="open">ひらく</button>
  </div>
</div>

<!-- 本 -->
<div id="head"><span id="era">序</span><button id="back">▹ 表紙へ</button></div>
<div id="book"><div id="pages"></div></div>
<div class="hint" id="hint">◃ 左へ、めくる</div>

<script>
const $=s=>document.querySelector(s);
let FAM='';

const JO=[
  'これは、英雄の物語ではない。',
  '城を建てた者も、天下を取った者も、ここには出てこない。',
  '出てくるのは、その傍らで畑を耕し、子を産み、手を握り、名も残さず死んでいった――あなたの、遠い先祖たちだ。',
  '千五百年。ひとつの手が、次の手を、握り続けた。その、記録である。',
];

const CH=[
  { no:'一', era:'古墳時代', ttl:'古墳時代', who:'河内のむら ・ ひな', p:[
    '山が、できていく。',
    '人の手で土を運び、突き固め、幾百の背が朝から晩まで動いて、王の眠る山が、日ごとに空へせり上がっていく。ひなは、母の背から、それを見ていた。',
    '王の名は、知らない。ひなの一族が、なぜその土を運ぶのかも、知らない。ただ、父の掌(てのひら)が土で黒く割れていることと、その父が夜、囲炉裏のそばでひなの小さな手を握ると、割れた掌がひどく熱いことだけを、知っていた。',
    '「大きな人が、死んだのだ」と母は言った。「わたしたちは、土を盛る」',
    '王は山になり、名を残した。土を盛った者たちは、名を残さない。',
    'けれど、握られた手の熱さは――ひなから、その子へ、その子の子へと、握られ続けていく。それだけが、この一族の、たったひとつの相続だった。',
  ]},
  { no:'二', era:'飛鳥時代', ttl:'飛 鳥', who:'飛鳥の里 ・ あすか', p:[
    '金色(こんじき)の、人がいた。',
    '海の向こうから来たという新しい仏(ほとけ)が、御方(おかた)の寺に、金色に光って坐(ざ)していた。あすかは、父の後ろから、それを見上げた。父は、その御堂(みどう)の柱を削った、幾人もの手のひとりだった。',
    '「あれは、新しい神さまだ」と、里の者はひそひそ言った。「都の偉い方々が、どちらの神を敬うかで、争っておられる」',
    'あすかには、どちらの神も、遠かった。ただ、金の光がまぶしくて、思わず父の手を握ると、木くずで荒れたその手が、握り返してきた。',
    '神々が争い、都が移り、豪族の名が石碑に刻まれていく。柱を削った父の名は、どこにも残らない。',
    'けれど、荒れた手の、その握り返しの強さだけを、あすかは覚えて帰った。',
  ]},
  { no:'三', era:'奈良時代', ttl:'奈 良', who:'東国の村 ・ たみ', p:[
    '夫は、東(あづま)の果てへ、発(た)っていった。',
    '防人(さきもり)、と役人は言った。遠い筑紫(つくし)の海を、名も知らぬ敵から守るのだと。なぜ、この村の男が、見たこともない海を守らねばならぬのか――たみには、わからなかった。',
    '都では、途方もなく大きな仏(ほとけ)が、金と汗を集めて造られているという。その同じ国が、たみから、夫を取り上げた。',
    '発つ朝、夫は、たみの手を、長いあいだ握っていた。言葉は、なかった。',
    '夫は、帰らなかった。歌のひとつも、残さずに。',
    'たみは、生まれた子の手を握って、夫がそうしたように、長く、黙って、握った。それが、たみに残された、たったひとつの、夫だった。',
  ]},
  { no:'四', era:'平安時代', ttl:'平安時代', who:'都 ・ 下女、あこ', p:[
    '牛車(ぎっしゃ)が、通り過ぎていく。',
    '簾(すだれ)の隙間から絹の色がこぼれ、香が漂い、笑い声が、あこの頭の上を越えていった。あこは道の端に膝をつき、泥に手をついて、それが過ぎるのを待つ。',
    'あの中の姫君は、生涯、土に触れることがないのだという。あこの手は、洗い物と薪で、もう子どもの手ではなかった。',
    '夜、下女部屋で、あこは熱を出した幼い妹の手を握った。硬く、荒れた、自分の手で。',
    '都は千年の雅(みやび)を、書物に残す。あこの名は、どこにも書かれない。',
    'ただ、握った手は、温かかった。それでいい、とあこは思った。',
  ]},
  { no:'五', era:'鎌倉時代', ttl:'鎌 倉', who:'西の浜辺の村 ・ まさ', p:[
    '海の彼方に、見たこともない数の帆が、現れたという。',
    '蒙古(もうこ)、と人は震えた。異国の兵が九州の浜に押し寄せ、火を噴く玉を投げるのだと、逃げてきた者が語った。まさの村は海から遠かったが、夜ごと、誰もが浜の方を見ては、手を合わせた。',
    '嵐が来て、異国の船は沈んだ、と後になって聞いた。神風(かみかぜ)だ、と社(やしろ)の神主は誇った。武士たちは、恩賞を求めて鎌倉へ上っていった。',
    'まさは、ただ、震える老いた母の手を、夜通し握っていた夜のことを、覚えている。神が吹かせたのか、運が良かったのか。それは、わからない。',
    'わかるのは、あの夜、握った母の手が、氷のように冷たく、けれど、たしかに脈打っていたことだけだ。',
  ]},
  { no:'六', era:'室町時代', ttl:'室 町', who:'焼ける都 ・ きく', p:[
    '都が、焼けていた。',
    '十年、そのまた十年と、武士たちは都の中で争い続け、まちは幾度も焼けた。応仁(おうにん)の乱、と後の世は呼ぶ。きくの一家は焼け出され、荷を負って、東へ流れていく人の列に加わった。',
    '「上(かみ)の争いだ」と、父は吐き捨てた。「わしらには、名も、理由(わけ)も、わからぬ」',
    '流れる道の途中、幼い弟が、疲れて泣いた。きくは、その小さな手を握って、歩いた。焼けた都の煙を背に、名もなき人の列の中で、手だけを、離さずに。',
    '乱はやがて全国へ広がり、世は、下剋上(げこくじょう)の戦国へ雪崩(なだれ)ていく。',
    'その大きな流れの、ほんの一滴として、きくは弟の手を握り、生き延びた。ただ、それだけを。',
  ]},
  { no:'七', era:'戦国', ttl:'戦 国', who:'尾張 ・ むすめ、たね', p:[
    '畑の向こうに土煙が上がったのは、稲刈りの前の日だった。',
    '「織田さまの軍が、こっちへ来る」――物見に走った男が、息を切らして叫んだ。父は鍬を置き、たねの手を、痛いほど強く握った。',
    'その日、たねの村は焼けなかった。軍は、ただ通り過ぎていった。名も知らぬ大きな戦の、ほんの端を、たねたちは息をひそめてやり過ごした。',
    'その戦が、やがて世を統べ、天下を変えることを、たねは知らない。',
    'ただ、稲は無事に実り、その秋も、家族は生きた。握られた手の、あの痛いほどの熱さだけを、たねは一生、覚えていた。',
  ]},
  { no:'八', era:'江戸時代', ttl:'江 戸', who:'長屋 ・ さと', p:[
    '戦(いくさ)の音が、絶えて久しい。',
    'さとが生まれてこのかた、田畑を焼く軍も、逃げ惑う夜も、なかった。祖母は「ありがたいことだ」と、何度も言った。祖母の、そのまた祖母の頃は、まだ、村が焼けた話が残っていたという。',
    '大名(だいみょう)の行列が通る日は、みな道の端に平伏(ひれふ)した。顔を上げてはならぬ。さとは地面を見つめながら、隣の幼い妹の手を、そっと握っていた。誰にも見えぬように。',
    '行列は、金と槍を連ねて過ぎていく。その大名の名を、さとは知らない。',
    '夜、長屋の灯りの下で、母は繕(つくろ)いをし、父は湯屋(ゆや)の話をし、妹は膝で眠った。名もない、けれど、焼けない夜だった。',
    '握った妹の手は、恐れではなく、ただ、温かかった。この温かさのために、幾百年、手は握られてきたのかもしれない――と、さとは、まだ知らずに、眠った。',
  ]},
  { no:'九', era:'明治時代', ttl:'明 治', who:'糸を繰る町 ・ ちよ', p:[
    '汽車が、煙を吐いて、走っていた。',
    '鉄の道が国じゅうに敷かれ、ちよは、その汽車に乗せられて、遠い町の工場(こうば)へ売られていった。糸を繰(く)る工女(こうじょ)、と呼ばれた。年季が明けるまで、村へは帰れない。',
    '「お国のため、家(いえ)のためだ」と、村を出る朝、父は言った。文明開化(ぶんめいかいか)だと、富国強兵(ふこくきょうへい)だと、偉い人々は説いた。ちよには、糸と、機械の音と、眠れぬ夜だけが、現(うつつ)だった。',
    '窓の外を、初めて見る電信柱(でんしんばしら)が、飛ぶように過ぎていく。ちよは、隣で泣く同い年の工女の手を、そっと握った。荒れて、糸で切れた、自分の手で。',
    '国は、坂の上の雲を目指して、急いでいた。ちよの名は、その坂の、どこにも刻まれない。',
    'ただ、握った手は、温かかった。それが、遠い村の、母の手に似ていた。',
  ]},
  { no:'十', era:'大正時代', ttl:'大 正', who:'燃える町 ・ はる', p:[
    '地が、割れた。',
    '昼どき、火を使う刻(とき)に、大地がうねり、家々が崩れ、そして、火が出た。町は燃えた。大正(たいしょう)の、あの大きな地震(なゐ)を、はるは、逃げ惑う人の波の中で迎えた。',
    '新しい世だ、と町は言っていた。電灯が灯り、活動写真(かつどうしゃしん)が動き、女(おんな)も学びはじめた明るい世だと。その明るい町が、一日で、灰になった。',
    '火の粉のなかを、はるは、はぐれかけた幼い子の手を、力いっぱい握って走った。もう片方の手は、老いた父を引いていた。両の手が、ふさがっていた。それでも、離さなかった。',
    '幾万の名が、その日、失われた。多くは、名簿にも残らなかった。',
    '生き延びて焼け跡に立ったとき、はるの両の掌(てのひら)には、握りしめた二つの手の熱が、まだ、残っていた。',
  ]},
  { no:'十一', era:'昭和 ・ 戦(いくさ)の世', ttl:'昭 和', who:'焼け跡の街 ・ 母、すゑ', p:[
    '空が、燃えていた。',
    '警報。走る足。すゑは、防空壕の暗がりで、四つになる娘の手を握りしめていた。頭の上を、地の底を、音が通り過ぎていく。娘は泣かなかった。ただ、母の手を、握り返していた。',
    '新聞は遠い南の島の名を報じ、大本営は勝利を伝え続けた。すゑには、そのどれも、遠い言葉だった。すゑの世界は、この暗がりと、この小さな手の熱さが、すべてだった。',
    '朝が来て、二人は、まだ生きていた。焼け跡の匂いのなか、すゑは娘の手を引いて、歩き出した。',
    '国の歴史が、この時代をどんな名で呼ぶのだとしても。すゑにとってそれは、「あの子の手を、離さなかった年月」だった。',
  ]},
  { no:'十二', era:'平成', ttl:'平 成', who:'団地 ・ まさ子', p:[
    'テレビの中で、時代の名が、変わった。',
    '「平成(へいせい)」と、白い額(がく)が掲げられた朝を、まさ子は、小さな団地(だんち)の茶の間で見ていた。戦争を知る母――幼い日、防空壕で手を握られた、あの娘(こ)――は、もう、ずいぶん年老いていた。',
    '国は、豊かになったという。車があり、テレビがあり、誰も飢えない。かつて村を焼き、夫を、子を奪った同じ国が、いまは静かに、平らだった。',
    'やがて、好景気(こうけいき)は、泡(あわ)のように消えた。まさ子の夫の会社も、傾いた。それでも、飢えはしなかった。',
    '母が息を引き取る夜、まさ子は、その手を握った。しわだらけの、小さな手だった。母は最期に、握り返した。何も言わず、ただ、握り返した。',
    'その握り方に、まさ子は、覚えがあった。幼い日、自分が握られた、あの握り方だった。千五百年そうして握られてきたのだと――まさ子は、まだ、知らない。',
  ]},
  { no:'十三', era:'令和', ttl:'令 和', who:'ある街 ・ 名を継ぐ者', p:[
    '電車が、揺れている。',
    '夕方の車内。あなたは、隣で船を漕ぐ子どもの、小さな手を握っている。窓の外を、千五百年ぶんの街の灯りが、流れていく。',
    '古墳を積んだ手も、都の泥をついた手も、戦火の暗がりで握られた手も――名は、ひとつも残っていない。歴史の本に、彼らの頁(ページ)はない。',
    'けれど、いま、あなたの掌(てのひら)のなかで眠るこの子の手の熱さは、たしかに、あの日のひなの手の熱さと、地続きだ。',
    '千五百年、握られ続けた手が、いま、この子を握っている。',
    'やがてこの子も、誰かの手を握るだろう。名も残さず。けれど、たしかに――温かく。',
  ]},
];

function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function render(){
  const P=$("#pages"); P.innerHTML='';
  // 献辞入り 序
  const jo=el('div','ch');
  const job=el('div','jo');
  job.appendChild(el('div','h','序'));
  if(FAM) job.appendChild(el('p', null, `――<b>${FAM}</b>家に伝わる、名もなき者たちの物語。`));
  JO.forEach(t=>job.appendChild(el('p',null,t)));
  jo.appendChild(job); P.appendChild(jo);
  // 各章
  CH.forEach(c=>{
    const ch=el('div','ch');
    const t=el('div','tobira');
    t.appendChild(el('div','no', c.no));
    t.appendChild(el('div','ttl', c.ttl));
    t.appendChild(el('div','who', c.who));
    ch.appendChild(t);
    const b=el('div','body');
    c.p.forEach(par=>b.appendChild(el('p', null, par)));
    ch.appendChild(b);
    P.appendChild(ch);
  });
  P.appendChild(el('div','fin','― 了 ―'));
}
$("#open").onclick=()=>{
  FAM=($("#kamei").value||'').trim();
  render();
  $("#cover").style.display='none';
  $("#book").classList.add('show'); $("#head").classList.add('show'); $("#hint").classList.add('show');
  const P=$("#pages"); requestAnimationFrame(()=>{ P.scrollLeft=P.scrollWidth; });  // 右端＝物語の始まり
};
$("#back").onclick=()=>{ $("#book").classList.remove('show'); $("#head").classList.remove('show'); $("#hint").classList.remove('show'); $("#cover").style.display='flex'; };
// 走り：スクロール位置で時代表示
$("#pages")&&$("#pages");
document.addEventListener('scroll',()=>{},true);
</script>
